function parseLogCSV(csv){
  var lines=csv.split('\n');var section=null;var champData={};var awardsData=[];
  ALL.forEach(function(p){champData[p]=[];});
  lines.forEach(function(line){
    line=line.trim();if(!line)return;
    var cols=line.split(',').map(function(v){return v.replace(/^"|"$/g,'').trim();});
    var first=cols[0];
    if(first.indexOf('## CHAMPION_STATS')===0){section='champ';return;}
    if(first.indexOf('## AWARDS')===0){section='awards';return;}if(first.indexOf('## UPDATED')===0){section=null;return;}
    if(first==='선수'||first==='')return;
    if(section==='champ'&&cols.length>=6){
      var p=first,ch=cols[1],picks=+cols[2],wins=+cols[3],losses=+cols[4],wr=+cols[5];
      if(champData[p]!==undefined)champData[p].push({ch:ch,picks:picks,wins:wins,losses:losses,wr:wr});
    }else if(section==='awards'&&cols.length>=4){
      awardsData.push({name:first,mom:+cols[1],special:+cols[2],spirit:+cols[3]});
    }
  });
  return{champData:champData,awardsData:awardsData};
}

function aggregateLogs(log26,log25,log24){
  var champMap={};var awardsMap={};
  ALL.forEach(function(p){champMap[p]={};awardsMap[p]={name:p,mom:0,special:0,spirit:0};});
  [log26,log25,log24].forEach(function(log){
    if(!log)return;
    ALL.forEach(function(p){(log.champData[p]||[]).forEach(function(d){
      if(!champMap[p][d.ch])champMap[p][d.ch]={picks:0,wins:0,losses:0};
      champMap[p][d.ch].picks+=d.picks;champMap[p][d.ch].wins+=d.wins;champMap[p][d.ch].losses+=d.losses;

function computeRadarStats(dA, dKA26, dKA25, dKA24, d6, d25all, d24all, insights, champData) {
  // 승부력 계산용: 연도별 종합점수(compScore) 미리 산출
  var sc25map = calcCompScores(d25all);
  var sc24map = calcCompScores(d24all);

  var raw = {};
  ALL.forEach(function(nm) {
    var pa = dA.find(function(x){return x.name===nm;})||{kda:0,winRate:0,totalGames:0};
    var p6 = d6.find(function(x){return x.name===nm;})||{games:0};
    var p5 = d25all.find(function(x){return x.name===nm;})||{games:0};
    var p4 = d24all.find(function(x){return x.name===nm;})||{games:0};
    var g6=p6.games||0, g5=p5.games||0, g4=p4.games||0;
    var tg = g6+g5+g4||1;
    // 연도별 가중치: 2026×3, 2025×2, 2024×1 (최근 시즌일수록 더 강하게 반영)
    var w6=g6*3, w5=g5*2, w4=g4*1;
    var wt=w6+w5+w4||1;

    // 공격력: 연도별 경기당 킬 × 연도가중 + 2026 DPM 보정
    var kr6=g6>0?(dKA26[nm]?dKA26[nm].k:0)/g6:0;
    var kr5=g5>0?(dKA25[nm]?dKA25[nm].k:0)/g5:0;
    var kr4=g4>0?(dKA24[nm]?dKA24[nm].k:0)/g4:0;
    var dpm6=p6.dpm||0;
    var dpmBonus=(g6>0&&dpm6>0)?Math.min(1.5,(dpm6-600)/600)*(w6/wt):0;
    var atk=Math.max(0,(kr6*w6+kr5*w5+kr4*w4)/wt+dpmBonus);

    // 생존력: 연도별 KDA × 연도가중
    var kda6=p6.kda||0, kda5=p5.kda||0, kda4=p4.kda||0;
    var survive=(kda6*w6+kda5*w5+kda4*w4)/wt;

    // 팀워크: 연도별 경기당 어시스트 × 연도가중
    var ar6=g6>0?(dKA26[nm]?dKA26[nm].a:0)/g6:0;
    var ar5=g5>0?(dKA25[nm]?dKA25[nm].a:0)/g5:0;
    var ar4=g4>0?(dKA24[nm]?dKA24[nm].a:0)/g4:0;
    var teamwork=(ar6*w6+ar5*w5+ar4*w4)/wt;

    // 승부력: 연도별 종합점수(compScore) × 연도가중
    var cs6=p6.compScore||0;
    var cs5=sc25map[nm]||0;
    var cs4=sc24map[nm]||0;
    var compete=(cs6*w6+cs5*w5+cs4*w4)/wt;

    // 안정성: MOM·스페셜·투혼상 수상 가중합 / 총경기 × 100
    // 가중치: MOM=1.0 / 스페셜=0.7 / 투혼상=0.5 (비중 차등)
    var momCnt = 0, spcCnt = 0, spiCnt = 0;
    if(insights && insights.champAwards){
      insights.champAwards.forEach(function(a){
        if(a.player===nm){momCnt+=(a.mom||0);spcCnt+=(a.special||0);spiCnt+=(a.spirit||0);}
      });
    }
    var stability = (momCnt*1.0 + spcCnt*0.7 + spiCnt*0.5) / tg * 100;

    // 챔피언폭: sqrt(픽 챔피언 수) × 평균 챔피언 승률
    var champs = (champData && champData[nm]) || [];
    var avgWR = champs.length>0 ? champs.reduce(function(s,c){return s+c.wr;},0)/champs.length : 0;
    var champPool = Math.sqrt(Math.max(champs.length,0)) * (avgWR/100);

    raw[nm] = {atk:atk, survive:survive, teamwork:teamwork, compete:compete, stability:stability, champPool:champPool};
  });

  // 각 항목 0~100 정규화 (팀 내 min-max)
  var keys=['atk','survive','teamwork','compete','stability','champPool'];
  var norm = {};
  ALL.forEach(function(nm){norm[nm]={};});
  keys.forEach(function(k){
    var vals = ALL.map(function(nm){return raw[nm][k];});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    var rng = mx-mn || 1;
    ALL.forEach(function(nm){
      norm[nm][k] = Math.max(10, Math.round((raw[nm][k]-mn)/rng*100));
    });
  });
  return norm;
}

function radarSVG(stats, color) {
  var W=280, H=272, cx=140, cy=138, R=88;
  var keys  =['atk','survive','teamwork','compete','stability','champPool'];
  var labels=['공격력','생존력','팀워크','승부력','안정성','챔피언폭'];
  var n=6;
  var angles=keys.map(function(_,i){return (i*Math.PI*2/n)-Math.PI/2;});

  function pt(ang,r){return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)];}

  // 배경 그리드
  var grids='';
  [20,40,60,80,100].forEach(function(pct){
    var r=R*pct/100;
    var pts=angles.map(function(a){var p=pt(a,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    grids+='<polygon points="'+pts+'" fill="none" stroke="rgba(148,163,184,.13)" stroke-width="1"/>';
  });
  // 20% 눈금 텍스트
  var tickR=R*0.2;
  var tickP=pt(-Math.PI/2+0.18, tickR);
  grids+='<text x="'+tickP[0].toFixed(1)+'" y="'+tickP[1].toFixed(1)+'" fill="rgba(100,116,139,.5)" font-size="7.5" text-anchor="middle">20</text>';

  // 축선
  var axes=angles.map(function(a){
    var p=pt(a,R);
    return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(148,163,184,.2)" stroke-width="1"/>';
  }).join('');

  // 선수 폴리곤
  var polyPts=keys.map(function(k,i){
    var v=(stats[k]||0)/100;
    var p=pt(angles[i],R*v);
    return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  var poly='<polygon points="'+polyPts+'" fill="'+color+'" fill-opacity="0.2" stroke="'+color+'" stroke-width="2.5"/>';

  // 꼭짓점 점
  var dots=keys.map(function(k,i){
    var v=(stats[k]||0)/100;
    var p=pt(angles[i],R*v);
    return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="4" fill="'+color+'"/>';
  }).join('');

  // 라벨 + 수치 (더 크게)
  var GAP=26;
  var TIP_IDS=['stat-atk','stat-survive','stat-teamwork','stat-compete','stat-stability','stat-champpool'];
  var lblEls=labels.map(function(lbl,i){
    var a=angles[i];
    var lx=cx+(R+GAP)*Math.cos(a), ly=cy+(R+GAP)*Math.sin(a);
    var anc=Math.cos(a)>0.25?'start':Math.cos(a)<-0.25?'end':'middle';
    var sc=stats[keys[i]]||0;
    var tid=TIP_IDS[i];
    // SVG text에 class=stat-tip + data-tip-id 부여 → 기존 툴팁 시스템과 연결
    return '<text x="'+lx.toFixed(1)+'" y="'+(ly-5).toFixed(1)+'" fill="#94a3b8" font-size="11" text-anchor="'+anc+'" font-family="inherit" class="stat-tip" data-tip-id="'+tid+'" style="cursor:pointer">'+lbl+'</text>'
          +'<text x="'+lx.toFixed(1)+'" y="'+(ly+9).toFixed(1)+'" fill="'+color+'" font-size="13" font-weight="800" text-anchor="'+anc+'" font-family="inherit" class="stat-tip" data-tip-id="'+tid+'" style="cursor:pointer">'+sc+'</text>';
  }).join('');

  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'
    +grids+axes+poly+dots+lblEls+'</svg>';
}

function parsePosString(s){
  var m={TOP:'T',JG:'J',JNG:'J',MID:'M',AD:'B',BOT:'B',SUP:'S'};
  if(!s)return['T','J','M','B','S'];
  var r=s.split('/').map(function(p){return m[p.trim()];}).filter(Boolean);
  return r.length?r:['T','J','M','B','S'];
}

function assignPositions(players,positions){
  var result={},filled=new Set(),assigned=new Set();
  for(var maxFlex=1;maxFlex<=positions.length;maxFlex++){
    players.forEach(function(p){
      if(assigned.has(p.name))return;
      var avail=p.positions.filter(function(pos){return positions.indexOf(pos)>=0&&!filled.has(pos);});
      if(!avail.length||avail.length>maxFlex)return;
      result[avail[0]]=p;filled.add(avail[0]);assigned.add(p.name);
    });
  }
  // 남은 포지션·선수 무조건 채우기
  var remPos=positions.filter(function(p){return!filled.has(p);});
  var remPly=players.filter(function(p){return!assigned.has(p.name);});
  remPly.forEach(function(p,i){if(remPos[i])result[remPos[i]]=p;});
  return result;
}

// 맞라인 등급 격차 최소화: 팀 내 포지션 스왑 최적화
function fixGradeMatchups(t1,t2,posOrder){
  var gv={S:3,A:2,B:1,C:0};
  var gof=function(p){return p?gv[AN[p.name]?AN[p.name].t:'B']||0:0;};
  var viol=function(p1,p2){return p1&&p2?Math.abs(gof(p1)-gof(p2))>1?1:0:0;};
  // 팀 내 두 포지션 선수 스왑 가능 여부: 서로 상대 포지션에서 플레이 가능해야 함
  // (단, 포지션 미지정 = 모든 포지션 가능으로 간주)
  var canSwap=function(pa,pb,posA,posB){
    var aOk=pa.positions.length===0||pa.positions.indexOf(posB)>=0;
    var bOk=pb.positions.length===0||pb.positions.indexOf(posA)>=0;
    return aOk&&bOk;
  };
  var improved=true,maxIter=30;
  while(improved&&maxIter-->0){
    improved=false;
    // t1, t2 각각 시도
    [t1,t2].forEach(function(team){
      var opp=team===t1?t2:t1;
      for(var i=0;i<posOrder.length;i++){
        for(var j=i+1;j<posOrder.length;j++){
          var pi=posOrder[i],pj=posOrder[j];
          var a=team[pi],b=team[pj];
          if(!a||!b)continue;
          if(!canSwap(a,b,pi,pj))continue;
          // 현재 위반 합산
          var before=viol(a,opp[pi])+viol(b,opp[pj]);
          // 스왑 후 위반 합산
          var after=viol(b,opp[pi])+viol(a,opp[pj]);
          if(after<before){
            team[pi]=b;team[pj]=a;improved=true;
          }
        }
      }
    });
  }
}

window.generateRoster=function(){
  var checks=document.querySelectorAll('.roster-check:checked');
  var selected=Array.from(checks).map(function(c){return c.value;});
  if(selected.length<6){alert('최소 6명을 선택해주세요.');return;}

  // 선수별 복합 점수 계산
  var playerData=selected.map(function(nm){
    var rs=window._radarStats&&window._radarStats[nm];
    var ss=rs?((rs.atk||0)+(rs.survive||0)+(rs.teamwork||0)+(rs.compete||0)+(rs.stability||0)+(rs.champPool||0)):300;
    // 3년 평균 승률
    var d6d=window._d6data&&window._d6data.find(function(p){return p.name===nm;})||{winRate:50};
    var d5d=d25.find(function(p){return p.name===nm;})||{winRate:50};
    var d4d=d24.find(function(p){return p.name===nm;})||{winRate:50};
    var avgWR=(d6d.winRate+d5d.winRate+d4d.winRate)/3;
    // 복합 점수: STAT 70% + 승률(0-100→0-600 스케일) 30% + 랜덤 ±10%
    var composite=(ss*0.7+(avgWR*6)*0.3)*(1+(Math.random()-0.5)*0.2);
    var a=AN[nm]||{p:''};
    return{name:nm,score:composite,rawScore:ss,wr:avgWR,positions:parsePosString(a.p)};
  });

  playerData.sort(function(a,b){return b.score-a.score;});

  // 인원수별 포맷
  var n=selected.length;
  var teamSize=Math.min(Math.floor(n/2),5);
  var playing=playerData.slice(0,teamSize*2);
  var subs=playerData.slice(teamSize*2);

  // 스네이크 드래프트: 0,3,4,7,8 → 1팀 / 1,2,5,6,9 → 2팀
  var team1=[],team2=[];
  playing.forEach(function(p,i){
    var goA=(i%4===0||i%4===3);
    if(goA)team1.push(p);else team2.push(p);
  });

  // 포지션 결정
  var posOrder;
  if(teamSize>=5)posOrder=['T','J','M','B','S'];
  else if(teamSize===4)posOrder=['T','J','M','B'];
  else posOrder=['T','M','B'];

  var t1=assignPositions(team1,posOrder);
  var t2=assignPositions(team2,posOrder);

  // 맞라인 등급 격차 최소화 최적화
  fixGradeMatchups(t1,t2,posOrder);

  var t1Total=posOrder.reduce(function(s,p){return s+(t1[p]?t1[p].rawScore:0);},0);
  var t2Total=posOrder.reduce(function(s,p){return s+(t2[p]?t2[p].rawScore:0);},0);
  var balance=Math.round(Math.min(t1Total,t2Total)/Math.max(t1Total,t2Total)*100);

  window._rosterResult={t1:t1,t2:t2,subs:subs,positions:posOrder,t1Total:t1Total,t2Total:t2Total};

  // 결과 렌더
  var posLabel={T:'탑',J:'정글',M:'미드',B:'원딜',S:'서폿'};
  var balCol=balance>=95?'#4ade80':balance>=85?'#fbbf24':'#f87171';
  var gvR={S:3,A:2,B:1,C:0};
  var rows=posOrder.map(function(pos){
    var p1=t1[pos],p2=t2[pos];
    var g1=p1?gvR[AN[p1.name]?AN[p1.name].t:'B']||0:0;
    var g2=p2?gvR[AN[p2.name]?AN[p2.name].t:'B']||0:0;
    var mismatch=p1&&p2&&Math.abs(g1-g2)>1;
    return'<tr style="'+(mismatch?'background:rgba(251,191,36,.05)':'')+'">'
      +'<td class="roster-pos" style="text-align:center">'+pos+'<div style="font-size:.62rem;color:#334155">'+posLabel[pos]+'</div></td>'
      +'<td style="text-align:right;padding-right:24px">'+(p1?at(AN[p1.name]?AN[p1.name].t:'B')+' <b class="roster-player">'+p1.name+'</b>':'<span style="color:#334155">?</span>')+'</td>'
      +'<td style="text-align:center;color:#334155;font-size:.8rem">'+(mismatch?'<span title="등급 격차 2단계 이상" style="color:#fbbf24;font-size:.9rem">⚠️</span>':'vs')+'</td>'
      +'<td style="padding-left:24px">'+(p2?at(AN[p2.name]?AN[p2.name].t:'B')+' <b class="roster-player">'+p2.name+'</b>':'<span style="color:#334155">?</span>')+'</td>'
    +'</tr>';
  }).join('');

  var subsHtml='';
  if(subs.length){
    subsHtml='<div style="margin-top:16px;padding:14px 16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid #334155">'
      +'<div style="font-size:.75rem;font-weight:700;color:#64748b;margin-bottom:10px">🔄 식스맨 (대기)</div>'
      +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
      +subs.map(function(s){
        return'<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#1e293b;border-radius:8px;border:1px solid #334155">'
          +at(AN[s.name]?AN[s.name].t:'B')
          +'<span style="font-weight:700;font-size:.82rem;color:#f1f5f9">'+s.name+'</span>'
          +'<span style="font-size:.68rem;color:#475569">'+s.positions.join('/')+'</span>'
        +'</div>';
      }).join('')
      +'</div></div>';
  }

  document.getElementById('roster-result').innerHTML=
    '<div style="background:#1e293b;border-radius:12px;border:1px solid #334155;overflow:hidden">'
      +'<div style="padding:14px 18px;background:rgba(129,140,248,.08);border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px">'
        +'<span style="font-size:1rem;font-weight:800;color:#f1f5f9">🎮 대진표</span>'
        +'<span style="font-size:.75rem;color:'+balCol+';font-weight:700;background:rgba(255,255,255,.06);padding:2px 10px;border-radius:10px">⚖️ 전력 균형 '+balance+'%</span>'
        +'<span style="font-size:.72rem;color:#475569;margin-left:auto">1팀 '+Math.round(t1Total)+' vs 2팀 '+Math.round(t2Total)+'</span>'
      +'</div>'
      +'<table class="roster-table"><tbody>'+rows+'</tbody></table>'
    +'</div>'
    +subsHtml;

  document.getElementById('roster-reroll').style.display='inline-block';
  document.getElementById('roster-copy-btn').style.display='inline-block';
  document.getElementById('roster-copy-btn').textContent='📋 슬랙 공유';
};

window.copyRoster=function(){
  var r=window._rosterResult;
  if(!r){return;}
  var posLabel={T:'T',J:'J',M:'M',B:'B',S:'S'};
  var lines=['🎮 런치롤탐 대진표','──────────────────'];
  var maxLen=r.positions.reduce(function(m,p){
    var n1=r.t1[p]?r.t1[p].name.length:1;
    var n2=r.t2[p]?r.t2[p].name.length:1;
    return Math.max(m,n1,n2);
  },0);
  r.positions.forEach(function(pos){
    var p1=r.t1[pos]?r.t1[pos].name:'?';
    var p2=r.t2[pos]?r.t2[pos].name:'?';
    var pad=p1+' '.repeat(Math.max(0,maxLen-p1.length+2));
    lines.push(pos+'  '+pad+p2);
  });
  lines.push('──────────────────');
  lines.push('⚖️ 전력 균형 '+Math.round(Math.min(r.t1Total,r.t2Total)/Math.max(r.t1Total,r.t2Total)*100)+'%');
  if(r.subs.length){
    lines.push('');
    lines.push('🔄 식스맨');
    r.subs.forEach(function(s){lines.push(s.positions.join('/')+' '+s.name);});
  }
  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    var btn=document.getElementById('roster-copy-btn');
    btn.textContent='✅ 복사 완료!';
    setTimeout(function(){btn.textContent='📋 슬랙 공유';},2000);
  });
};

function parseInsightsCSV(csv){
  if(!csv)return{synergy:[],rivals:[],champAwards:[],topKDA:[],topDmgDealt:[],topDmgTaken:[],recentAwards:[]};
  // pCSV를 사용해 quoted comma("105,271" 같은 천 단위 구분자)를 올바르게 파싱
  var rows=pCSV(csv);
  var section=null;
  var d={synergy:[],rivals:[],champAwards:[],topKDA:[],topDmgDealt:[],topDmgTaken:[],recentAwards:[],matchLog:[]};
  function toN(v){var n=+String(v||0).replace(/,/g,'');return isNaN(n)?0:n;}
  rows.forEach(function(cols){
    if(!cols||cols.length===0)return;
    var f=(cols[0]||'').trim();
    if(!f)return;
    if(f.indexOf('## SYNERGY')===0){section='syn';return;}
    if(f.indexOf('## RIVALS')===0){section='riv';return;}
    if(f.indexOf('## CHAMP_AWARDS')===0){section='ca';return;}
    if(f.indexOf('## TOP_KDA')===0){section='kda';return;}
    if(f.indexOf('## TOP_DMG_DEALT')===0){section='dld';return;}
    if(f.indexOf('## TOP_DMG_TAKEN')===0){section='dlt';return;}
    if(f.indexOf('## RECENT_AWARDS')===0){section='rec';return;}
    if(f.indexOf('## MATCH_LOG')===0){section='mlog';return;}
    if(f.indexOf('## ')===0){section=null;return;}
    if(f==='선수1'||f==='선수'||f==='날짜')return;
    var c=cols.map(function(v){return(v||'').trim();});
    switch(section){
      case'syn': d.synergy.push({p1:c[0],p2:c[1],together:toN(c[2]),wins:toN(c[3]),wr:toN(c[4])});break;
      case'riv': d.rivals.push({p1:c[0],p2:c[1],count:toN(c[2]),w1:toN(c[3]),w2:toN(c[4])});break;
      case'ca':  d.champAwards.push({player:c[0],champ:c[1],mom:toN(c[2]),special:toN(c[3]),spirit:toN(c[4]),total:toN(c[5])});break;
      case'kda': d.topKDA.push({player:c[0],champ:c[1],k:toN(c[2]),d:toN(c[3]),a:toN(c[4]),kda:toN(c[5]),date:c[6],won:c[7],year:c[8]});break;
      case'dld': d.topDmgDealt.push({player:c[0],champ:c[1],val:toN(c[2]),date:c[3],won:c[4],year:c[5]});break;
      case'dlt': d.topDmgTaken.push({player:c[0],champ:c[1],val:toN(c[2]),date:c[3],won:c[4],year:c[5]});break;
      case'rec': d.recentAwards.push({date:c[0],player:c[1],type:c[2]});break;
      case'mlog': if(c[0]&&c[2]) d.matchLog.push({date:c[0],year:c[1],result:c[2],team1:c[3],team2:c[4],mom:c[5],special:c[6],spirit:c[7],playerKda:c[8],duration:c[9]||''});break;
    }
  });
  return d;
}

// ── 경기 로그 헬퍼 ────────────────────────────────────────────────
function parseTeam(str){
  if(!str)return[];
  return str.split('|').map(function(s){
    var m=s.match(/^(.+)\((.+)\)$/);
    return m?{player:m[1].trim(),champ:m[2].trim()}:null;
  }).filter(Boolean);
}
function parseAward(str){
  if(!str)return null;
  var m=str.match(/^(.+)\((.+)\)$/);
  return m?{player:m[1].trim(),champ:m[2].trim()}:null;
}

// ── 경기 상세 팝업 HTML 생성 ──────────────────────────────────────
function buildMatchPopupHtml(match){
  var t1=parseTeam(match.team1), t2=parseTeam(match.team2);
  var allPlayers=t1.concat(t2);
  var win1=match.result==='1팀 승', winCol='#4ade80', loseCol='#64748b';
  var yearCol={'2026':'#818cf8','2025':'#34d399','2024':'#fb923c'}[match.year]||'#94a3b8';
  var mom=parseAward(match.mom), spc=parseAward(match.special), spi=parseAward(match.spirit);

  // 전 선수 스탯 파싱
  // 2024/2025: "pName:k/d/a|..."  (3개 값)
  // 2026: "pName:k/d/a/ddealt/dtaken/dpm/dtpm/gpm|..."  (8개 값)
  var kdaMap={};
  var is2026=(match.year==='2026');
  if(match.playerKda){
    match.playerKda.split('|').forEach(function(e){
      var idx=e.indexOf(':');if(idx<0)return;
      var name=e.substring(0,idx).trim();
      var parts=e.substring(idx+1).trim().split('/');
      if(parts.length<3)return;
      var k=+parts[0],d=+parts[1],a=+parts[2];
      var stat={k:k,d:d,a:a,kda:d>0?Math.round((k+a)/d*100)/100:k+a};
      if(parts.length>=8){
        stat.ddealt=+parts[3]; stat.dtaken=+parts[4];
        stat.dpm=+parts[5];    stat.dtpm=+parts[6];    stat.gpm=+parts[7];
      }
      kdaMap[name]=stat;
    });
  }
  // 보완: insights topKDA에서 누락 선수 채우기
  var ins=window._insights||{};
  (ins.topKDA||[]).filter(function(r){return r.date===match.date;})
    .forEach(function(r){if(!kdaMap[r.player])kdaMap[r.player]={kda:r.kda,k:r.k,d:r.d,a:r.a};});

  // KDA 색상 코딩: 무데스→보라 / 4+→초록 / 2.5+→파랑 / 1.5+→노랑 / 미만→빨강
  function kdaColor(kda){
    if(!kda)return'#475569';
    if(kda.d===0&&(kda.k+kda.a)>=5)return'#a78bfa';
    if(kda.kda>=4)return'#4ade80';
    if(kda.kda>=2.5)return'#60a5fa';
    if(kda.kda>=1.5)return'#fbbf24';
    return'#f87171';
  }

  // 수상자 아이콘 맵 — MOM/스페셜/투혼상은 항상 3명 각각 유니크
  var awardIconMap={};
  if(mom) awardIconMap[mom.player]='👑';
  if(spc) awardIconMap[spc.player]='⭐';
  if(spi) awardIconMap[spi.player]='💪';

  // 2026 전용: 전체 딜량/받은피해량 최댓값 (바 정규화 기준)
  var allPlayers2026=t1.concat(t2);
  var maxDdealt=Math.max.apply(null,allPlayers2026.map(function(p){var k=kdaMap[p.player];return k&&k.ddealt?k.ddealt:0;}).concat([1]));
  var maxDtaken=Math.max.apply(null,allPlayers2026.map(function(p){var k=kdaMap[p.player];return k&&k.dtaken?k.dtaken:0;}).concat([1]));

  function playerRow(p, isWinner, teamMaxKA){
    var inAN=AN[p.player];
    var kda=kdaMap[p.player];
    var ka=kda?(kda.k+kda.a):0;
    var barPct=teamMaxKA>0?Math.min(100,Math.round(ka/teamMaxKA*100)):0;
    var kShare=ka>0?Math.round(kda.k/ka*100):0;
    var kdaCol=kdaColor(kda);

    return'<div style="padding:8px 0;border-bottom:1px solid rgba(51,65,85,.22)">'
      // 1줄: 챔프아이콘 + 등급 + 선수명 + 수상아이콘 + KDA 뱃지
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        +champIcon(p.champ,24)
        +(inAN?at(inAN.t):'')
        +'<span style="font-size:.82rem;font-weight:700;color:#f1f5f9;flex:1">'+p.player+'</span>'
        +(awardIconMap[p.player]?'<span style="font-size:.8rem">'+awardIconMap[p.player]+'</span>':'')
        +(kda?'<span class="tip-icon" data-tip-id="popup-kda" style="font-size:.78rem;font-weight:900;color:'+kdaCol
          +';background:rgba(255,255,255,.06);padding:1px 8px;border-radius:4px;cursor:pointer;width:auto;border:none">'
          +kda.kda+(kda.d===0?'<span style="font-size:.6rem;color:#a78bfa;margin-left:2px">PD</span>':'')
        +'</span>':'')
      +'</div>'
      // 2줄: K/D/A 숫자
      +(kda
        ?'<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:.75rem;padding-left:30px">'
          +'<b style="color:#4ade80">'+kda.k+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#f87171">'+kda.d+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#60a5fa">'+kda.a+'</b>'
          +'<span style="color:#475569;font-size:.68rem;margin-left:4px">'+p.champ+'</span>'
        +'</div>'
        :'<div style="font-size:.68rem;color:#334155;padding-left:30px;margin-bottom:5px">'+p.champ+' · 데이터 없음</div>'
      )
      // 3줄: K+A 기여도 바 — 팀 내 킬·어시스트 기여 비율
      +'<div class="tip-icon" data-tip-id="popup-bar" style="display:flex;align-items:center;gap:6px;padding-left:30px;margin-bottom:'+(is2026&&kda&&kda.dpm?'6px':'0')+';cursor:pointer;width:auto;border:none">'
        +'<div style="flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden">'
          +(barPct>0
            ?'<div style="height:100%;border-radius:3px;display:flex;width:'+barPct+'%">'
              +'<div style="width:'+kShare+'%;background:#4ade80;min-width:'+(kda&&kda.k>0?2:0)+'px"></div>'
              +'<div style="flex:1;background:#60a5fa"></div>'
            +'</div>'
            :'')
        +'</div>'
        +'<span style="font-size:.64rem;color:#475569;min-width:20px;text-align:right">'+(kda?ka:'')+'</span>'
      +'</div>'
      // 2026 전용: 가한 피해량 / 받은 피해량 바 (흐릿하게 — 정보 강약 조절)
      +(is2026&&kda&&(kda.ddealt||kda.dtaken)
        ?(function(){
          function dmgBar(label,val,max,col){
            var pct=max>0?Math.min(100,Math.round(val/max*100)):0;
            return'<div style="display:flex;align-items:center;gap:5px;padding-left:30px;opacity:.45">'
              +'<span style="font-size:.6rem;color:'+col+';min-width:42px">'+label+'</span>'
              +'<div style="flex:1;height:3px;background:#1e293b;border-radius:2px;overflow:hidden">'
                +'<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:2px"></div>'
              +'</div>'
              +'<span style="font-size:.62rem;color:'+col+';min-width:48px;text-align:right">'+(val>0?val.toLocaleString():'—')+'</span>'
            +'</div>';
          }
          return'<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">'
            +(kda.ddealt?dmgBar('가한피해',kda.ddealt,maxDdealt,'#fb923c'):'')
            +(kda.dtaken?dmgBar('받은피해',kda.dtaken,maxDtaken,'#818cf8'):'')
          +'</div>';
        })()
        :'')
    +'</div>';
  }

  function teamBlock(players, isWinner, label){
    var borderCol=isWinner?winCol:loseCol;
    // 팀 내 최대 K+A (바 정규화 기준)
    var teamMaxKA=Math.max.apply(null,players.map(function(p){
      var kd=kdaMap[p.player];return kd?kd.k+kd.a:0;
    }).concat([1]));
    return'<div style="flex:1;min-width:220px;background:rgba(255,255,255,.03);border-radius:10px;border:1.5px solid '

        +''

  function awardRow(a, icon, col, label){

  var hasStats=Object.keys(kdaMap).length>0||Object.keys(dmgMap).length>0;

  // 경기 시간 포맷 변환 (mm:ss → mm분 ss초 / h:mm:ss → h시간 mm분 ss초)
  function fmtDuration(s){
    if(!s)return'';
    var p=s.split(':');
    if(p.length===2)return p[0]+'분';
    if(p.length===3)return p[0]+'시간 '+p[1]+'분';

function renderMatchLogPage(insights){
  if(!insights||!insights.matchLog||!insights.matchLog.length){
    return'<div class="spinner">💡 Apps Script에서 🚀 전체 데이터 추출을 실행해주세요.</div>';
  }
  var YCOL={'2026':'#818cf8','2025':'#34d399','2024':'#fb923c'};
  var yearCounts={};
  insights.matchLog.forEach(function(m){yearCounts[m.year]=(yearCounts[m.year]||0)+1;});

  // 상단 요약 뱃지
  var summary='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">'
    +['2026','2025','2024'].map(function(y){
      var col=YCOL[y]||'#94a3b8';
      return'<div style="padding:6px 14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid '+col+';font-size:.78rem">'
        +'<span style="color:'+col+';font-weight:700">'+y+'</span>'
        +'<span style="color:#64748b"> · '+(yearCounts[y]||0)+'경기</span></div>';
    }).join('')
    +'<div style="padding:6px 14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid #334155;font-size:.78rem;margin-left:auto">'
      +'총 <b style="color:#f1f5f9">'+insights.matchLog.length+'</b>경기</div>'
    +'</div>';

  // 타임라인 — 시즌별 그룹핑, 최신순
  var byYear={'2026':[],'2025':[],'2024':[]};
  insights.matchLog.forEach(function(m,idx){
    if(byYear[m.year])byYear[m.year].push({m:m,idx:idx});
  });

  var timeline=['2026','2025','2024'].map(function(y){
    var games=byYear[y];
    if(!games||!games.length)return'';
    var col=YCOL[y]||'#94a3b8';
    var rows=games.map(function(g){
      var m=g.m, idx=g.idx;
      var t1=parseTeam(m.team1), t2=parseTeam(m.team2);
      var win1=m.result==='1팀 승';
      var resCol=win1?'#4ade80':'#f87171';
      var mom=parseAward(m.mom), spc=parseAward(m.special), spi=parseAward(m.spirit);

      var icons1=t1.slice(0,5).map(function(p){return champIcon(p.champ,22);}).join('');
      var icons2=t2.slice(0,5).map(function(p){return champIcon(p.champ,22);}).join('');

      // 수상 3명 한줄 표기
      var awards='';
      if(mom)awards+='<span style="font-size:.72rem;color:#64748b">👑<span style="color:#fbbf24;font-weight:700"> '+mom.player+'</span></span>';
      if(spc)awards+='<span style="font-size:.72rem;color:#64748b;margin-left:8px">⭐<span style="color:#818cf8;font-weight:700"> '+spc.player+'</span></span>';
      if(spi)awards+='<span style="font-size:.72rem;color:#64748b;margin-left:8px">💪<span style="color:#f472b6;font-weight:700"> '+spi.player+'</span></span>';

      return'<div onclick="showMatchPopup('+idx+')" '
        +'style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#1e293b;border-radius:10px;'
        +'border:1px solid #334155;cursor:pointer;transition:.15s;flex-wrap:wrap" '
        +'onmouseover="this.style.borderColor=\''+col+'\'" onmouseout="this.style.borderColor=\'#334155\'">'
        // 날짜
        +'<div style="min-width:88px;flex-shrink:0">'
          +'<div style="font-size:.82rem;font-weight:800;color:#f1f5f9">'+m.date.slice(5)+'</div>'
          +'<div style="font-size:.68rem;color:#475569">'+m.date.slice(0,4)+'</div>'
        +'</div>'
        // 결과
        +'<div style="min-width:44px;flex-shrink:0;text-align:center">'
          +'<span style="font-size:.72rem;font-weight:800;color:'+resCol+';background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px">'+m.result+'</span>'
        +'</div>'
        // 팀 아이콘
        +'<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:200px">'
          +'<div style="display:flex;gap:2px;border-right:1px solid #334155;padding-right:8px">'+icons1+'</div>'
          +'<span style="font-size:.7rem;color:#475569;flex-shrink:0">vs</span>'
          +'<div style="display:flex;gap:2px">'+icons2+'</div>'
        +'</div>'
        // 수상 3명
        +(awards?'<div style="display:flex;gap:0;flex-shrink:0;flex-wrap:wrap">'+awards+'</div>':'')
      +'</div>';
    }).join('');

    return'<div style="margin-bottom:24px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div style="width:3px;height:20px;background:'+col+';border-radius:2px"></div>'
        +'<span style="font-size:1rem;font-weight:900;color:'+col+'">'+y+'시즌</span>'
        +'<span style="font-size:.75rem;color:#475569">'+games.length+'경기</span>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div>'
    +'</div>';
  }).join('');

  return summary+timeline;
}

function renderFormWidget(insights){
  if(!insights)return'';

  // 경기당 수상 3개(MOM·스페셜·투혼상) → 30건 = 약 10경기 분량
  var RECENT_SLICE=30;
  var momCnt={},spcCnt={},spiCnt={};
  ALL.forEach(function(p){momCnt[p]=0;spcCnt[p]=0;spiCnt[p]=0;});
  var hasData=false;
  var usingFallback=false; // fallback 여부를 별도 추적

  if(insights.recentAwards&&insights.recentAwards.length){
    insights.recentAwards.slice(0,RECENT_SLICE).forEach(function(a){
      var t=(a.type||'').trim();
      if(momCnt[a.player]!==undefined){
        if(t==='MOM')    {momCnt[a.player]++;hasData=true;}
        if(t==='스페셜') {spcCnt[a.player]++;hasData=true;}
        if(t==='투혼상') {spiCnt[a.player]++;hasData=true;}
      }
    });
  }

  // fallback: recentAwards 타입 값 없으면 champAwards 누적치 사용
  // hasData는 덮어쓰지 않고 usingFallback으로만 추적
  if(!hasData&&insights.champAwards&&insights.champAwards.length){
    usingFallback=true;
    insights.champAwards.forEach(function(a){
      if(momCnt[a.player]!==undefined){
        momCnt[a.player]+=(a.mom||0);
        spcCnt[a.player]+=(a.special||0);
        spiCnt[a.player]+=(a.spirit||0);
      }
    });
    hasData=ALL.some(function(p){return momCnt[p]+spcCnt[p]+spiCnt[p]>0;});
  }

  if(!hasData){
    return'<div style="padding:10px 16px 12px;border-bottom:1px solid #1e293b;margin-bottom:4px;font-size:.78rem;color:#475569">🔥 최근 활약 현황 — 인사이트 데이터 추출 후 표시됩니다</div>';
  }

  var topMOM=ALL.slice().sort(function(a,b){return momCnt[b]-momCnt[a];}).slice(0,3);
  var topSpc=ALL.slice().sort(function(a,b){return spcCnt[b]-spcCnt[a];}).slice(0,3);
  var topSpi=ALL.slice().sort(function(a,b){return spiCnt[b]-spiCnt[a];}).slice(0,3);

  // usingFallback일 때만 "누적 기준" 표시 — hasData만으론 구분 불가
  var periodLabel=usingFallback?'누적 기준 (인사이트 재추출 시 최근 기준으로 전환)':'최근 10경기 기준';
  var periodColor='#94a3b8';

  // 카드 렌더 — cnt=0이면 이름 흐리게, 횟수 '–' 표시
  function pCard(p,cnt,col,bg){
    var hasCnt=cnt>0;
    var _pe=p.replace(/'/g,"\\'");
    return'<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:'+(hasCnt?bg:'transparent')+';border-radius:8px;opacity:'+(hasCnt?'1':'.4')+'">'
      +at(AN[p]?AN[p].t:'B')
      +'<span onclick="showPlayerMatches(\''+_pe+'\',null)" style="font-weight:700;font-size:.82rem;flex:1;cursor:pointer">'+p+'</span>'
      +'<span style="color:'+(hasCnt?col:'#475569')+';font-weight:900;font-size:.82rem">'+(hasCnt?cnt+'회':'–')+'</span>'
      +'</div>';
  }

  var momHtml=topMOM.map(function(p){return pCard(p,momCnt[p],'#fbbf24','rgba(251,191,36,.06)');}).join('');
  var spcHtml=topSpc.map(function(p){return pCard(p,spcCnt[p],'#60a5fa','rgba(96,165,250,.06)');}).join('');
  var spiHtml=topSpi.map(function(p){return pCard(p,spiCnt[p],'#f472b6','rgba(244,114,182,.06)');}).join('');

  return'<div style="padding:10px 16px 14px;border-bottom:1px solid #1e293b;margin-bottom:4px">'
    +'<div style="font-size:.65rem;color:'+periodColor+';letter-spacing:.3px;margin-bottom:8px">'+periodLabel+'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#fbbf24;margin-bottom:6px">🔥 최근 승리 견인중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(MOM)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+momHtml+'</div>'
      +'</div>'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#60a5fa;margin-bottom:6px">⭐ 최근 묵묵 활약중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(스페셜)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+spcHtml+'</div>'
      +'</div>'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#f472b6;margin-bottom:6px">💜 최근 고통 감내중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(투혼상)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+spiHtml+'</div>'
      +'</div>'
    +'</div></div>';
}

function initPerfTabs(){
  var perfPanel=document.getElementById('perf-tab-inner');
  if(!perfPanel)return;
  var ptabs=perfPanel.querySelectorAll('[data-ptab]');
  ptabs.forEach(function(btn){
    btn.addEventListener('click',function(){
      ptabs.forEach(function(b){b.classList.remove('act');});
      btn.classList.add('act');
      var t=btn.getAttribute('data-ptab');
      ['kda','dealt','taken'].forEach(function(id){
        var el=document.getElementById('perf-'+id);if(el)el.style.display=t===id?'block':'none';
      });
    });
  });
}

function renderPerfPage(insights){
  if(!insights||(!insights.topKDA.length&&!insights.topDmgDealt.length&&!insights.topDmgTaken.length)){
    return'<div class="spinner">💡 Apps Script에서 🔥 인사이트 데이터 추출을 실행해주세요.</div>';

  function perfTable(data,valLabel,valFmt){

    var isDmg=(valLabel!=='KDA');
    var valAlign=isDmg?'right':'left';
    // 고정 컬럼 너비 — 세 테이블이 동일한 세로 그리드 공유

    var rows=data.slice(0,10).map(function(r,i){
      var val=valFmt(r);var wonCol=r.won==='승'?'#4ade80':'#f87171';

        +'<td class="rk" style="width:'+W.rk+'">'+(i+1)+'</td>'
        +'<td class="nm" style="width:'+W.player+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+at(AN[r.player]?AN[r.player].t:'B')+' '+r.player+'</td>'
        +'<td class="nm" style="width:'+W.champ+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+champIcon(r.champ,20)+' '+r.champ+'</td>'
        +'<td style="width:'+W.val+';color:#fbbf24;font-weight:900;font-size:.95rem;text-align:'+valAlign+'">'+val+'</td>'
        +'<td style="width:'+W.date+';color:#60a5fa;font-size:.8rem;text-align:center;cursor:pointer;text-decoration:underline;text-decoration-color:rgba(96,165,250,.3)" onclick="showMatchByDate(\''+r.date+'\')" title="경기 상세 보기">'+(r.date||'-')+'</td>'
        +'<td style="width:'+W.won+';color:'+wonCol+';font-weight:700;text-align:center">'+(r.won||'-')+'</td>'
        +'<td style="width:'+W.year+';color:#475569;font-size:.75rem;text-align:center">'+r.year+'</td>'
        +'</tr>';
    }).join('');
    return'<table class="t" style="min-width:600px">'
      +'<thead><tr>'
      +'<th style="width:'+W.rk+'">#</th>'
      +'<th style="width:'+W.player+';text-align:left">선수</th>'
      +'<th style="width:'+W.champ+';text-align:left">챔피언</th>'
      +'<th style="width:'+W.val+';text-align:'+valAlign+'">'+valLabel+'</th>'
      +'<th style="width:'+W.date+'">날짜</th>'
      +'<th style="width:'+W.won+'">승패</th>'
      +'<th style="width:'+W.year+'">시즌</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table>';
  }
  return'<div style="margin-bottom:12px;padding:8px 14px;background:#1e293b;border-radius:8px;border-left:3px solid #334155;font-size:.78rem;color:#94a3b8">📌 가한/받은 피해량은 2026 시즌 기준으로 집계됩니다.</div>'+'<div style="display:grid;grid-template-columns:1fr;gap:20px">'
    +'<div class="kda-section-wrap"><div class="kda-section-title">⚡ KDA TOP 10 <span class="ka-sub">단일 경기 최고 기록</span></div>'
    +perfTable(insights.topKDA,'KDA',function(r){return r.kda+' ('+r.k+'/'+r.d+'/'+r.a+')';})
    +'</div>'
    +'<div class="kda-section-wrap"><div class="kda-section-title">🗡️ 가한 피해량 TOP 10 <span class="ka-sub">단일 경기</span></div>'
    +perfTable(insights.topDmgDealt,'피해량',function(r){return r.val.toLocaleString();})
    +'</div>'
    +'<div class="kda-section-wrap"><div class="kda-section-title">🛡️ 받은 피해량 TOP 10 <span class="ka-sub">단일 경기</span></div>'
    +perfTable(insights.topDmgTaken,'받은피해량',function(r){return r.val.toLocaleString();})
    +'</div>'
    +'</div>';

function champAwardBadge(player,champ,insights){
  if(!insights||!insights.champAwards)return'';
  var a=insights.champAwards.find(function(x){return x.player===player&&x.champ===champ;});
  if(!a||a.total===0)return'';
  var parts=[];
  if(a.mom>0)    parts.push('<span class="aw-tag" data-tip-id="award-mom"    style="color:#fbbf24">👑<span style="font-size:.7rem">'+a.mom+'</span></span>');
  if(a.special>0)parts.push('<span class="aw-tag" data-tip-id="award-special" style="color:#a78bfa">⭐<span style="font-size:.7rem">'+a.special+'</span></span>');
  if(a.spirit>0) parts.push('<span class="aw-tag" data-tip-id="award-spirit"  style="color:#f472b6">💪<span style="font-size:.7rem">'+a.spirit+'</span></span>');
  if(!parts.length)return'';
  return'<span style="margin-left:10px;display:inline-flex;gap:9px;vertical-align:middle;align-items:center;border-left:1px solid rgba(51,65,85,.6);padding-left:10px">'+parts.join('')+'</span>';
}

window.toggleSynRow=function(uid,p){

  var isOpen=row.style.display==='table-row';

// ── 경기 목록 팝업 공통 함수 ─────────────────────────────────────
// 선수명으로 KDA 파싱
window._parsePlayerKDA=function(kdaStr,playerName){
  if(!kdaStr||!playerName)return null;
  var result=null;
  kdaStr.split('|').forEach(function(e){
    var idx=e.indexOf(':');if(idx<0)return;
    if(e.substring(0,idx).trim()!==playerName)return;
    var parts=e.substring(idx+1).trim().split('/');
    if(parts.length<3)return;
    var k=+parts[0],d=+parts[1],a=+parts[2];
    result={k:k,d:d,a:a,kda:d>0?Math.round((k+a)/d*100)/100:k+a};
  });
  return result;
};

// matchLog 필터링 → 목록 아이템 배열 생성
window.buildMatchListItems=function(playerName,champName,yearFilter){
  var log=window._matchLog||[];
  var items=[];
  var pA=window._parseAward||function(){return null;};
  var pT=window._parseTeam||function(){return[];};
  log.forEach(function(m,idx){
    if(yearFilter&&m.year!==yearFilter)return;
    // 팀 번호 추적 (0=1팀, 1=2팀)
    var found=null, foundTeam=-1;
    [m.team1,m.team2].forEach(function(teamStr,ti){
      if(!teamStr)return;
      teamStr.split('|').forEach(function(e){
        var bi=e.lastIndexOf('(');if(bi<0)return;
        var pl=e.substring(0,bi).trim(), ch=e.substring(bi+1).replace(')','').trim();
        if(playerName&&pl!==playerName)return;
        if(champName&&ch!==champName)return;
        if(!found){found={player:pl,champ:ch};foundTeam=ti;}
      });
    });
    if(!found)return;
    // 이 선수의 승/패 판정
    var playerWon=(m.result==='1팀 승'&&foundTeam===0)||(m.result==='2팀 승'&&foundTeam===1);
    var kda=playerName?window._parsePlayerKDA(m.playerKda,playerName):null;
    var award='';
    if(playerName){
      var pn=function(s){if(!s)return'';var i=s.lastIndexOf('(');return i>=0?s.substring(0,i).trim():s;};
      if(pn(m.mom)===playerName)award='👑';
      else if(pn(m.special)===playerName)award='⭐';
      else if(pn(m.spirit)===playerName)award='💪';
    }
    items.push({idx:idx,date:m.date,year:m.year,result:m.result,won:playerWon,champ:found.champ,kda:kda,award:award});
  });
  return items;
};

        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:.82rem;font-weight:700;color:#f1f5f9">'+item.date+'</div>'
          +(item.champ?'<div style="font-size:.7rem;color:#64748b">'+item.champ+'</div>':'')
        +'</div>'
        +(kda?'<div style="text-align:right;flex-shrink:0">'
          +'<div style="font-size:.75rem;font-weight:900;color:'+kdaCol+'">'+kda.kda+(kda.d===0?' PD':'')+'</div>'
          +'<div style="font-size:.67rem;color:#475569">'+kda.k+'/'+kda.d+'/'+kda.a+'</div>'
        +'</div>':'')
        +'<div style="text-align:right;flex-shrink:0;min-width:32px">'
          +'<div style="font-size:.82rem;font-weight:900;color:'+resCol+'">'+resLabel+'</div>'
          +(item.award?'<div style="font-size:.9rem">'+item.award+'</div>':'')
        +'</div>'
      +'</div>';
    }).join('');
  }
  document.getElementById('match-list-body').innerHTML=html;
  document.getElementById('match-list-popup').style.display='flex';
  document.body.style.overflow='hidden';
};

window.closeMatchListPopup=function(){
  document.getElementById('match-list-popup').style.display='none';
  if(document.getElementById('match-popup').style.display==='none') document.body.style.overflow='';
};

// 연결 포인트별 진입 함수
window.showPlayerChampMatches=function(player,champ){
  showMatchListPopup(player+' · '+champ+' 출전 경기',window.buildMatchListItems(player,champ,null));
};
window.showPlayerAwardMatches=function(player){
  var log=window._matchLog||[];
  var pA=window._parseAward||function(){return null;};
  var pT=window._parseTeam||function(){return[];};
  var pn=function(s){if(!s)return'';var i=s.lastIndexOf('(');return i>=0?s.substring(0,i).trim():s;};
  var items=[];
  log.forEach(function(m,idx){
    var award='';
    if(pn(m.mom)===player)award='👑';
    else if(pn(m.special)===player)award='⭐';
    else if(pn(m.spirit)===player)award='💪';
    if(!award)return;
    var kda=window._parsePlayerKDA(m.playerKda,player);
    var teams=pT(m.team1).concat(pT(m.team2));
    var fc=null;teams.forEach(function(p){if(p.player===player)fc=p.champ;});
    items.push({idx:idx,date:m.date,year:m.year,result:m.result,champ:fc,kda:kda,award:award});
  });
  showMatchListPopup(player+' 수상 경기',items);
};
window.showPlayerMatches=function(player,year){
  var items=window.buildMatchListItems(player,null,year||null);
  showMatchListPopup(player+' 출전 경기'+(year?' ('+year+'시즌)':''),items);
};

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var mp=document.getElementById('match-popup');
    var lp=document.getElementById('match-list-popup');
    if(mp&&mp.style.display!=='none')closeMatchPopup();
    else if(lp&&lp.style.display!=='none')closeMatchListPopup();
  }
});
