function parseLogCSV(csv){
  var lines=csv.split('\n');var section=null;var champData={};var awardsData=[];
  ALL.forEach(function(p){champData[p]=[];});
  lines.forEach(function(line){
    line=line.trim();if(!line)return;
    var cols=line.split(',').map(function(v){return v.replace(/^"|"$/g,'').trim();});
    var first=cols[0];
    if(first.indexOf('## CHAMPION_STATS')===0){section='champ';return;}
    if(first.indexOf('## AWARDS')===0){section='awards';return;}
    if(first==='선수'||first==='')return;
    if(section==='champ'&&cols.length>=6){
      var p=first,ch=cols[1],picks=+cols[2],wins=+cols[3],losses=+cols[4],wr=+cols[5];
      if(champData[p]!==undefined)champData[p].push({ch:ch,picks:picks,wins:wins,losses:losses,wr:wr});
    }else if(section==='awards'&&cols.length>=4){
      awardsData.push({name:first,mom:+cols[1],special:+cols[2],spirit:+cols[3]});
    }
  });
  return{champData:champData,awardsData:awardsData};
}

function calcCompScores(data){var kdas=data.map(function(p){return p.kda;});var wrs=data.map(function(p){return p.winRate;});var n=kdas.length;var mK=kdas.reduce(function(a,b){return a+b;},0)/n;var mW=wrs.reduce(function(a,b){return a+b;},0)/n;var sK=Math.sqrt(kdas.map(function(k){return Math.pow(k-mK,2);}).reduce(function(a,b){return a+b;},0)/(n-1));var sW=Math.sqrt(wrs.map(function(w){return Math.pow(w-mW,2);}).reduce(function(a,b){return a+b;},0)/(n-1));var res={};data.forEach(function(p){var zK=(p.kda-mK)/sK;var zW=(p.winRate-mW)/sW;res[p.name]=Math.round(Math.min(100,Math.max(0,60+5*(3.0*zK+0.6*zW)))*10)/10;});return res;}

function initAwardsSort(){
  var thh=document.querySelectorAll('#awards-inner th.sh');

  var _awSort={k:'total',d:1};
  thh.forEach(function(th){
    th.addEventListener('click',function(){

      if(_awSort.k===k){_awSort.d*=-1;}else{_awSort.k=k;_awSort.d=1;}
      thh.forEach(function(t){t.classList.remove('asc','desc');});
      th.classList.add(_awSort.d===1?'desc':'asc');

        var av=k==='total'?(a.mom+a.special+a.spirit):a[k];

      });
