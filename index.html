function parseLogCSV(csv){
  var lines=csv.split('\n');var section=null;var champData={};var awardsData=[];
  ALL.forEach(function(p){champData[p]=[];});
  lines.forEach(function(line){
    line=line.trim();if(!line)return;
    var cols=line.split(',').map(function(v){return v.replace(/^"|"$/g,'').trim();});
    var first=cols[0];
    if(first.indexOf('## CHAMPION_STATS')===0){section='champ';return;}
    if(first.indexOf('## AWARDS')===0){section='awards';return;}if(first.indexOf('## UPDATED')===0){section=null;return;}
    if(first==='선수'||first==='')return;
    if(section==='champ'&&cols.length>=6){
      var p=first,ch=cols[1],picks=+cols[2],wins=+cols[3],losses=+cols[4],wr=+cols[5];
      if(champData[p]!==undefined)champData[p].push({ch:ch,picks:picks,wins:wins,losses:losses,wr:wr});
    }else if(section==='awards'&&cols.length>=4){
      awardsData.push({name:first,mom:+cols[1],special:+cols[2],spirit:+cols[3]});
    }
  });
  return{champData:champData,awardsData:awardsData};
}

function aggregateLogs(log26,log25,log24){
  var champMap={};var awardsMap={};
  ALL.forEach(function(p){champMap[p]={};awardsMap[p]={name:p,mom:0,special:0,spirit:0};});
  [log26,log25,log24].forEach(function(log){
    if(!log)return;
    ALL.forEach(function(p){(log.champData[p]||[]).forEach(function(d){
      if(!champMap[p][d.ch])champMap[p][d.ch]={picks:0,wins:0,losses:0};
      champMap[p][d.ch].picks+=d.picks;champMap[p][d.ch].wins+=d.wins;champMap[p][d.ch].losses+=d.losses;
    });});
    (log.awardsData||[]).forEach(function(a){
      if(awardsMap[a.name]){awardsMap[a.name].mom+=a.mom;awardsMap[a.name].special+=a.special;awardsMap[a.name].spirit+=a.spirit;}
    });
  });
  var champData={};
  ALL.forEach(function(p){
    champData[p]=Object.keys(champMap[p]).map(function(ch){
      var s=champMap[p][ch];
      return{ch:ch,picks:s.picks,wins:s.wins,losses:s.losses,wr:s.picks>0?Math.round(s.wins/s.picks*100):0};
    }).sort(function(a,b){return b.picks-a.picks;});
  });
  return{champData:champData,awardsData:ALL.map(function(p){return awardsMap[p];})};
}

function computeYearChampAwards(matchLog, yearStr){
  var map={};
  (matchLog||[]).forEach(function(m){
    if(yearStr&&m.year!==yearStr)return; // 연도 필터 (null이면 전체)
    [['mom',m.mom],['special',m.special],['spirit',m.spirit]].forEach(function(pair){
      var t=pair[0],s=pair[1];
      if(!s)return;
      var idx=s.lastIndexOf('(');if(idx<0)return;
      var pl=s.substring(0,idx).trim(), ch=s.substring(idx+1).replace(')','').trim();
      var key=pl+'|'+ch;
      if(!map[key])map[key]={player:pl,champ:ch,mom:0,special:0,spirit:0,total:0};
      map[key][t]++;map[key].total++;
    });
  });
  return Object.values(map);
}

// 시즌 종합점수(compScore) — 시즌 티어 결정
// 신 산식: 롤 상대 지표(킬지분·킬관여·데스회피·딜지분) + 보정 승률의 z-score 조합
// matchLog 파생지표가 준비되기 전(초기 렌더)에는 구 KDA+승률 산식으로 폴백
function calcCompScoresLegacy(data){var kdas=data.map(function(p){return p.kda;});var wrs=data.map(function(p){return p.winRate;});var n=kdas.length;var mK=kdas.reduce(function(a,b){return a+b;},0)/n;var mW=wrs.reduce(function(a,b){return a+b;},0)/n;var sK=Math.sqrt(kdas.map(function(k){return Math.pow(k-mK,2);}).reduce(function(a,b){return a+b;},0)/(n-1))||1;var sW=Math.sqrt(wrs.map(function(w){return Math.pow(w-mW,2);}).reduce(function(a,b){return a+b;},0)/(n-1))||1;var res={};data.forEach(function(p){var zK=(p.kda-mK)/sK;var zW=(p.winRate-mW)/sW;res[p.name]=Math.round(Math.min(100,Math.max(0,60+5*(3.0*zK+0.6*zW)))*10)/10;});return res;}
function calcCompScores(data,year){
  if(!year||!window._mlGames||!window._mlGames.length)return calcCompScoresLegacy(data);
  var games=window._mlGames,base=window._mlBase;
  // 시즌 한정 롤 상대 지표 누적
  var acc={};
  ALL.forEach(function(nm){acc[nm]={actK:0,expK:0,actKP:0,expKP:0,actD:0,expD:0,actDmg:0,expDmg:0,n:0};});
  games.forEach(function(g){
    if(g.year!==year)return;
    var a=acc[g.name];
    if(!a||!g.pos||g.teamK<=0||g.teamD<=0)return;
    a.n++;
    a.actK+=g.k;        a.expK+=g.teamK*mlPosBase(base,g.size,g.pos,'kill');
    a.actKP+=(g.k+g.a); a.expKP+=g.teamK*mlPosBase(base,g.size,g.pos,'kp');
    a.actD+=g.d;        a.expD+=g.teamD*mlPosBase(base,g.size,g.pos,'death');
    if(g.dmgOK&&g.teamDmg>0){a.actDmg+=g.dmg;a.expDmg+=g.teamDmg*mlPosBase(base,g.size,g.pos,'dmg');}
  });
  var rel={},names=[];
  ALL.forEach(function(nm){
    var a=acc[nm];
    var sd=data.find(function(p){return p.name===nm;});
    if(!sd||!sd.games||a.n===0)return;
    names.push(nm);
    rel[nm]={
      kill:a.expK>0?a.actK/a.expK:0,
      kp:a.expKP>0?a.actKP/a.expKP:0,
      surv:Math.min(a.actD>0?a.expD/a.actD:2,2.5),
      dmg:a.expDmg>0?a.actDmg/a.expDmg:null,
      wr:((sd.wins||0)+3)/((sd.games||0)+6),
      games:a.n
    };
  });
  if(!names.length)return calcCompScoresLegacy(data);
  function zOf(field){
    var arr=names.map(function(n){return rel[n][field];}).filter(function(v){return v!=null;});
    if(!arr.length)return{};
    var mean=arr.reduce(function(a,b){return a+b;},0)/arr.length;
    var sd=Math.sqrt(arr.map(function(v){return(v-mean)*(v-mean);}).reduce(function(a,b){return a+b;},0)/Math.max(arr.length-1,1))||1;
    var o={};
    names.forEach(function(n){
      var v=rel[n][field];
      if(v==null){o[n]=0;return;}
      var z=(v-mean)/sd;
      z*=Math.sqrt(rel[n].games/(rel[n].games+6)); // 시즌 표본 신뢰도 수축
      o[n]=z;
    });
    return o;
  }
  var zKill=zOf('kill'),zKP=zOf('kp'),zSurv=zOf('surv'),zDmg=zOf('dmg'),zWR=zOf('wr');
  var hasDmg=names.some(function(n){return rel[n].dmg!=null;});
  var res={};
  names.forEach(function(nm){
    var s;
    if(hasDmg){ // 2026: 딜지분 포함
      s=60+8*(0.7*zKill[nm]+0.9*zKP[nm]+0.6*zSurv[nm]+0.6*(zDmg[nm]||0)+0.9*zWR[nm]);
    }else{      // 2024·2025: K/D/A 파생 + 승률
      s=60+8*(0.8*zKill[nm]+1.0*zKP[nm]+0.7*zSurv[nm]+1.0*zWR[nm]);
    }
    res[nm]=Math.round(Math.min(100,Math.max(0,s))*10)/10;
  });
  return res;
}

// matchLog 기반 파생지표 (프로씬 지표: 킬지분·킬관여율 KP%·데스지분·딜지분 DMG%)
// 경기별 10인 스탯에서 팀 합계를 역산 → "같은 롤 리그 평균 대비" 상대 지표 산출
// ═══════════════════════════════════════════════════════════════
// matchLog → 선수별 경기 레코드 배열 (팀 합계 포함)
function mlBuildPlayerGames(matchLog){
  var games=[];
  (matchLog||[]).forEach(function(m){
    if(!m.team1||!m.team2)return;
    var kdaMap={};
    if(m.playerKda){
      m.playerKda.split('|').forEach(function(e){
        var idx=e.indexOf(':');if(idx<0)return;
        var name=e.substring(0,idx).trim();
        var parts=e.substring(idx+1).trim().split('/');
        if(parts.length<3)return;
        var st={k:+parts[0]||0,d:+parts[1]||0,a:+parts[2]||0};
        if(parts.length>=8){st.ddealt=+parts[3]||0;}
        kdaMap[name]=st;
      });
    }
    [[m.team1,m.result==='1팀 승'],[m.team2,m.result==='2팀 승']].forEach(function(pair){
      var entries=pair[0].split('|').map(function(e){
        var bi=e.lastIndexOf('(');if(bi<0)return null;
        return{name:e.substring(0,bi).trim(),champ:e.substring(bi+1).replace(')','').trim()};
      }).filter(Boolean);
      if(entries.length<3)return;
      var posArr=_POS_MAP[entries.length]||_POS_MAP[5];
      var teamK=0,teamD=0,teamDmg=0,dmgOK=true;
      var members=[],missingReg=false;
      entries.forEach(function(en,idx){
        // 게스트(정규 12인 명단 외)는 포지션 슬롯(idx)만 차지, 통계엔 미집계
        if(ALL.indexOf(en.name)<0)return;
        var st=kdaMap[en.name];
        if(!st){missingReg=true;return;} // 정규 선수인데 KDA 누락 → 데이터 불완전
        teamK+=st.k;teamD+=st.d;
        if(st.ddealt>0)teamDmg+=st.ddealt;else dmgOK=false;
        members.push({name:en.name,pos:posArr[idx]||null,st:st});
      });
      if(missingReg)return; // 정규 선수 KDA 누락 팀은 제외 (게스트 누락은 허용)
      members.forEach(function(mb){
        games.push({name:mb.name,year:m.year,date:m.date,pos:mb.pos,size:entries.length,win:pair[1],
          k:mb.st.k,d:mb.st.d,a:mb.st.a,dmg:mb.st.ddealt||0,
          teamK:teamK,teamD:teamD,teamDmg:teamDmg,dmgOK:dmgOK});
      });
    });
  });
  return games;
}

// 포지션×팀규모별 리그 평균 지분 — 기대값 산출용 베이스라인
function mlPosBaselines(games){
  var agg={};
  games.forEach(function(g){
    if(!g.pos||g.teamK<=0||g.teamD<=0)return;
    var key=g.size+'|'+g.pos;
    if(!agg[key])agg[key]={n:0,kill:0,kp:0,death:0,dmg:0,dmgN:0};
    var a=agg[key];
    a.n++;
    a.kill+=g.k/g.teamK;
    a.kp+=(g.k+g.a)/g.teamK;
    a.death+=g.d/g.teamD;
    if(g.dmgOK&&g.teamDmg>0){a.dmg+=g.dmg/g.teamDmg;a.dmgN++;}
  });
  var base={};
  Object.keys(agg).forEach(function(key){
    var a=agg[key];
    base[key]={n:a.n,kill:a.kill/a.n,kp:a.kp/a.n,death:a.death/a.n,dmg:a.dmgN>0?a.dmg/a.dmgN:0,dmgN:a.dmgN};
  });
  return base;
}
function mlPosBase(base,size,pos,field){
  var b=base[size+'|'+pos];
  if(b&&b.n>=15&&(field!=='dmg'||b.dmgN>=10))return b[field];
  // 표본 부족 시 같은 포지션 전체 크기 평균으로 폴백
  var tot=0,n=0;
  Object.keys(base).forEach(function(key){
    if(key.split('|')[1]!==pos)return;
    var bb=base[key];var cnt=field==='dmg'?bb.dmgN:bb.n;
    tot+=bb[field]*cnt;n+=cnt;
  });
  return n>0?tot/n:0.2;
}

var YEAR_W={'2026':5,'2025':2,'2024':0.5};

// 선수별 롤 상대(rel) 지표: 실제 누적 ÷ 롤 평균 기대 누적 (1.0 = 같은 롤 평균)
// scope: '2026'|'2025'|'2024' = 해당 시즌만(균등 가중) / 생략 = 3년 연도가중
function mlRelMetrics(games,base,scope){
  var acc={};
  ALL.forEach(function(nm){acc[nm]={actK:0,expK:0,actKP:0,expKP:0,actD:0,expD:0,actDmg:0,expDmg:0,n:0,pgi:[],pgiW:[]};});
  games.forEach(function(g){
    var a=acc[g.name];
    if(!a||!g.pos||g.teamK<=0||g.teamD<=0)return;
    if(scope&&g.year!==scope)return;
    var w=scope?1:(YEAR_W[g.year]||1);
    a.n++;
    a.actK+=w*g.k;        a.expK+=w*g.teamK*mlPosBase(base,g.size,g.pos,'kill');
    a.actKP+=w*(g.k+g.a); a.expKP+=w*g.teamK*mlPosBase(base,g.size,g.pos,'kp');
    a.actD+=w*g.d;        a.expD+=w*g.teamD*mlPosBase(base,g.size,g.pos,'death');
    if(g.dmgOK&&g.teamDmg>0){
      a.actDmg+=g.dmg;    a.expDmg+=g.teamDmg*mlPosBase(base,g.size,g.pos,'dmg');
    }
    // 안정성용 경기별 기여 지수 (롤 보정 킬관여 − 롤 보정 데스지분)
    var kpRel=((g.k+g.a)/g.teamK)/Math.max(mlPosBase(base,g.size,g.pos,'kp'),0.05);
    var dRel=(g.d/g.teamD)/Math.max(mlPosBase(base,g.size,g.pos,'death'),0.05);
    a.pgi.push(kpRel-dRel);a.pgiW.push(w);
  });
  var out={};
  ALL.forEach(function(nm){
    var a=acc[nm];
    var relSurv=a.actD>0?a.expD/a.actD:(a.expD>0?2:0);
    var stdPGI=null;
    if(a.pgi.length>=6){
      var sw=0,mean=0;
      a.pgi.forEach(function(v,i){sw+=a.pgiW[i];mean+=v*a.pgiW[i];});
      mean/=sw;
      var varr=0;
      a.pgi.forEach(function(v,i){varr+=a.pgiW[i]*(v-mean)*(v-mean);});
      stdPGI=Math.sqrt(varr/sw);
    }
    out[nm]={
      relKill:a.expK>0?a.actK/a.expK:0,
      relKP:a.expKP>0?a.actKP/a.expKP:0,
      relSurv:Math.min(relSurv,2.5),
      relDmg:a.expDmg>0?a.actDmg/a.expDmg:null,
      stdPGI:stdPGI,games:a.n
    };
  });
  return out;
}

// z-score 정규화 + 표본 신뢰도 수축 → 5~100 (평균 50)
function statZNorm(vals,names,gamesMap,K){
  var arr=names.map(function(n){return vals[n];}).filter(function(v){return v!=null&&isFinite(v);});
  if(!arr.length){var o0={};names.forEach(function(n){o0[n]=50;});return o0;}
  var mean=arr.reduce(function(a,b){return a+b;},0)/arr.length;
  var sd=Math.sqrt(arr.map(function(v){return(v-mean)*(v-mean);}).reduce(function(a,b){return a+b;},0)/Math.max(arr.length-1,1))||1;
  var out={};
  names.forEach(function(n){
    var v=vals[n];
    if(v==null||!isFinite(v)){out[n]=50;return;}
    var z=(v-mean)/sd;
    var g=gamesMap[n]||0;
    z*=Math.sqrt(g/(g+(K||8))); // 표본 적으면 평균(50)으로 수축 — 신규 선수 보호
    out[n]=Math.max(5,Math.min(100,Math.round(50+20*z)));
  });
  return out;
}

var _POSLB_SCOPES=[['2026','2026년'],['2025','2025년'],['2024','2024년'],['all','🌐 3년 종합']];
function renderPosLbPage(){
  var games=window._mlGames||[],base=window._mlBase||{};
  if(!games.length)return'<div class="spinner">⏳ 데이터 로딩 중...</div>';

  // 스코프별(연도) 포지션 데이터 빌드
  function buildScope(scope){
    var acc={};
    games.forEach(function(g){
      if(!g.pos||g.teamK<=0||g.teamD<=0)return;
      if(scope!=='all'&&g.year!==scope)return;
      var key=g.pos+'|'+g.name;
      if(!acc[key])acc[key]={pos:g.pos,name:g.name,n:0,wins:0,rawKA:0,rawK:0,rawTeamK:0,rawD:0,rawTeamD:0,rawDmg:0,rawTeamDmg:0,
        actK:0,expK:0,actKP:0,expKP:0,actD:0,expD:0,actDmg:0,expDmg:0};
      var a=acc[key],w=scope==='all'?(YEAR_W[g.year]||1):1;
      a.n++;if(g.win)a.wins++;
      a.rawKA+=g.k+g.a;a.rawK+=g.k;a.rawTeamK+=g.teamK;
      a.rawD+=g.d;a.rawTeamD+=g.teamD;
      a.actK+=w*g.k;        a.expK+=w*g.teamK*mlPosBase(base,g.size,g.pos,'kill');
      a.actKP+=w*(g.k+g.a); a.expKP+=w*g.teamK*mlPosBase(base,g.size,g.pos,'kp');
      a.actD+=w*g.d;        a.expD+=w*g.teamD*mlPosBase(base,g.size,g.pos,'death');
      if(g.dmgOK&&g.teamDmg>0){a.rawDmg+=g.dmg;a.rawTeamDmg+=g.teamDmg;a.actDmg+=g.dmg;a.expDmg+=g.teamDmg*mlPosBase(base,g.size,g.pos,'dmg');}
    });
    var byPos={T:[],J:[],M:[],B:[],S:[]};
    Object.keys(acc).forEach(function(key){
      var a=acc[key];
      if(!byPos[a.pos])return;
      var relKill=a.expK>0?a.actK/a.expK:0;
      var relKP=a.expKP>0?a.actKP/a.expKP:0;
      var relSurv=Math.min(a.actD>0?a.expD/a.actD:2,2.5);

  }).join('')+'</div>';

  var sections=_POSLB_SCOPES.map(function(pair){

    var minGames=scope==='all'?5:3;
    return['T','J','M','B','S'].map(function(p){

      var show=(scope==='2026'&&p==='T');
      return'<div id="poslb-'+scope+'-'+p+'" class="poslb-sec" style="display:'+(show?'block':'none')+'">'

// ── 육각형 레이더 차트 ─────────────────────────────────────────────
// 6축 = 서로 다른 원천 지표 1:1 대응 (KDA 중복 반영 제거)
//   공격력=롤 대비 딜지분+킬지분 / 생존력=롤 대비 데스 회피 / 팀워크=롤 대비 킬관여율
//   승부력=보정 승률+수상 결정력 / 안정성=경기 기복(σ) / 챔피언폭=폭×승률
// scope: '2026'|'2025'|'2024' = 해당 시즌 한정 / 생략 = 3년 연도가중
// awardsOverride: 시즌 한정 수상 맵 {name:{mom,spc,spi}} (scope 사용 시 필수)
function computeRadarStats(dA, dKA26, dKA25, dKA24, d6, d25all, d24all, insights, champData, scope, awardsOverride) {
  // 파생지표 캐시 (doFetch에서 선계산, 없으면 자체 빌드)
  if(!window._mlRel){
    window._mlGames=mlBuildPlayerGames((insights&&insights.matchLog)||[]);
    window._mlBase=mlPosBaselines(window._mlGames);
    window._mlRel=mlRelMetrics(window._mlGames,window._mlBase);
  }
  var rel=scope?mlRelMetrics(window._mlGames,window._mlBase,scope):window._mlRel;

  // 수상 집계 (승부력의 "결정력" 성분)
  var awardMap=awardsOverride;
  if(!awardMap){
    awardMap={};
    ALL.forEach(function(nm){awardMap[nm]={mom:0,spc:0,spi:0};});
    if(insights&&insights.champAwards){
      insights.champAwards.forEach(function(a){
        if(awardMap[a.player]){awardMap[a.player].mom+=a.mom||0;awardMap[a.player].spc+=a.special||0;awardMap[a.player].spi+=a.spirit||0;}
      });
    }
  }

  var raw={atk:{},survive:{},teamwork:{},compete:{},stability:{},champPool:{}};
  var gamesMap={};
  ALL.forEach(function(nm){
    var r=rel[nm]||{relKill:0,relKP:0,relSurv:0,relDmg:null,stdPGI:null,games:0};
    gamesMap[nm]=r.games;

    // 공격력: 롤 대비 딜지분(2026)과 킬지분(전 연도) 반반
    raw.atk[nm]=r.relDmg!=null?0.5*r.relKill+0.5*r.relDmg:(r.games>0?r.relKill:null);
    // 생존력: 롤 대비 데스 회피 (킬·어시와 완전 분리)
    raw.survive[nm]=r.games>0?r.relSurv:null;
    // 팀워크: 롤 대비 킬관여율 (KP%)
    raw.teamwork[nm]=r.games>0?r.relKP:null;

    // 승부력: 베이지안 보정 가중 승률 + 수상 결정력
    var p6=d6.find(function(p){return p.name===nm;})||{wins:0,games:0};
    var p5=d25all.find(function(p){return p.name===nm;})||{wins:0,games:0};
    var p4=d24all.find(function(p){return p.name===nm;})||{wins:0,games:0};
    var wW,wG,tg;
    if(scope){ // 시즌 한정: 해당 시즌 승률만
      var ps=scope==='2026'?p6:scope==='2025'?p5:p4;
      wW=ps.wins||0;wG=ps.games||0;tg=wG||1;
    }else{
      wW=(p6.wins||0)*5+(p5.wins||0)*2+(p4.wins||0)*0.5;
      wG=(p6.games||0)*5+(p5.games||0)*2+(p4.games||0)*0.5;
      tg=(p6.games||0)+(p5.games||0)+(p4.games||0)||1;
    }
    var adjWR=(wW+5)/(wG+10);
    var aw=awardMap[nm]||{mom:0,spc:0,spi:0};
    var awardRate=(aw.mom*1.0+aw.spc*0.6+aw.spi*0.4)/tg;
    raw.compete[nm]=adjWR+0.35*Math.min(awardRate,0.5);

    // 안정성: 경기별 기여 지수의 가중 표준편차 (낮을수록 기복 없음 → 부호 반전)
    raw.stability[nm]=r.stdPGI!=null?-r.stdPGI:null;

    // 챔피언폭: sqrt(챔프수) × 베이지안 보정 챔프 평균 승률
    var champs=(champData&&champData[nm])||[];
    var sWR=0;
    champs.forEach(function(c){sWR+=((c.wins||0)+1)/((c.picks||0)+2);});
    var avgWR=champs.length>0?sWR/champs.length:0;
    raw.champPool[nm]=champs.length>0?Math.sqrt(champs.length)*avgWR:null;
  });

  var norm={};
  ALL.forEach(function(nm){norm[nm]={};});
  var Kmap={atk:8,survive:8,teamwork:8,compete:10,stability:10,champPool:12};
  Object.keys(raw).forEach(function(k){
    var res=statZNorm(raw[k],ALL,gamesMap,Kmap[k]);
    ALL.forEach(function(nm){norm[nm][k]=res[nm];});
  });
  ALL.forEach(function(nm){norm[nm]._g=gamesMap[nm]||0;}); // 스코프 내 경기 수 (연도 탭에서 미출전자 제외용)
  return norm;
}

function radarSVG(stats, color) {
  var W=280, H=272, cx=140, cy=138, R=88;
  var keys  =['atk','survive','teamwork','compete','stability','champPool'];
  var labels=['공격력','생존력','팀워크','승부력','안정성','챔피언폭'];
  var n=6;
  var angles=keys.map(function(_,i){return (i*Math.PI*2/n)-Math.PI/2;});

  function pt(ang,r){return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)];}

  // 배경 그리드
  var grids='';
  [20,40,60,80,100].forEach(function(pct){
    var r=R*pct/100;
    var pts=angles.map(function(a){var p=pt(a,r);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
    grids+='<polygon points="'+pts+'" fill="none" stroke="rgba(148,163,184,.13)" stroke-width="1"/>';
  });
  // 20% 눈금 텍스트
  var tickR=R*0.2;
  var tickP=pt(-Math.PI/2+0.18, tickR);
  grids+='<text x="'+tickP[0].toFixed(1)+'" y="'+tickP[1].toFixed(1)+'" fill="rgba(100,116,139,.5)" font-size="7.5" text-anchor="middle">20</text>';

  // 축선
  var axes=angles.map(function(a){
    var p=pt(a,R);
    return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(148,163,184,.2)" stroke-width="1"/>';
  }).join('');

  // 선수 폴리곤
  var polyPts=keys.map(function(k,i){
    var v=(stats[k]||0)/100;
    var p=pt(angles[i],R*v);
    return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  var poly='<polygon points="'+polyPts+'" fill="'+color+'" fill-opacity="0.2" stroke="'+color+'" stroke-width="2.5"/>';

  // 꼭짓점 점
  var dots=keys.map(function(k,i){
    var v=(stats[k]||0)/100;
    var p=pt(angles[i],R*v);
    return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="4" fill="'+color+'"/>';
  }).join('');

  // 라벨 + 수치 (더 크게)
  var GAP=26;
  var TIP_IDS=['stat-atk','stat-survive','stat-teamwork','stat-compete','stat-stability','stat-champpool'];
  var lblEls=labels.map(function(lbl,i){
    var a=angles[i];
    var lx=cx+(R+GAP)*Math.cos(a), ly=cy+(R+GAP)*Math.sin(a);
    var anc=Math.cos(a)>0.25?'start':Math.cos(a)<-0.25?'end':'middle';
    var sc=stats[keys[i]]||0;
    var tid=TIP_IDS[i];
    // SVG text에 class=stat-tip + data-tip-id 부여 → 기존 툴팁 시스템과 연결
    return '<text x="'+lx.toFixed(1)+'" y="'+(ly-5).toFixed(1)+'" fill="#94a3b8" font-size="11" text-anchor="'+anc+'" font-family="inherit" class="stat-tip" data-tip-id="'+tid+'" style="cursor:pointer">'+lbl+'</text>'
          +'<text x="'+lx.toFixed(1)+'" y="'+(ly+9).toFixed(1)+'" fill="'+color+'" font-size="13" font-weight="800" text-anchor="'+anc+'" font-family="inherit" class="stat-tip" data-tip-id="'+tid+'" style="cursor:pointer">'+sc+'</text>';
  }).join('');

  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'
    +grids+axes+poly+dots+lblEls+'</svg>';
}

// 🎲 대진표 자동 생성
// ═══════════════════════════════════════════════════════════════
function parsePosString(s){
  var m={TOP:'T',JG:'J',JNG:'J',MID:'M',AD:'B',BOT:'B',SUP:'S'};
  if(!s)return['T','J','M','B','S'];
  var r=s.split('/').map(function(p){return m[p.trim()];}).filter(Boolean);
  return r.length?r:['T','J','M','B','S'];
}

// ── 포지션 데이터 빌드 (matchLog 기반) ─────────────────────────────
// 4v4: T J M B / 3v3: T M B
var _POS_MAP={5:['T','J','M','B','S'],4:['T','J','M','B'],3:['T','M','B']};
var POS_COL={T:'#f87171',J:'#4ade80',M:'#818cf8',B:'#60a5fa',S:'#fbbf24'};

function buildPosData(matchLog){
  var stats={},champPos={},matchPos={};
  (matchLog||[]).forEach(function(m){
    [[m.team1,true],[m.team2,false]].forEach(function(pair){
      var teamStr=pair[0];
      if(!teamStr)return;
      var entries=teamStr.split('|');
      var posArr=_POS_MAP[entries.length]||_POS_MAP[5];
      entries.forEach(function(e,idx){
        if(idx>=posArr.length)return;
        var pos=posArr[idx];
        var bi=e.lastIndexOf('(');if(bi<0)return;
        var player=e.substring(0,bi).trim();
        var champ=e.substring(bi+1).replace(')','').trim();
        if(!player||!champ)return;
        if(!stats[player])stats[player]={T:0,J:0,M:0,B:0,S:0};
        stats[player][pos]=(stats[player][pos]||0)+1;
        var ck=player+'|'+champ;
        if(!champPos[ck])champPos[ck]={T:0,J:0,M:0,B:0,S:0};
        champPos[ck][pos]=(champPos[ck][pos]||0)+1;
        matchPos[player+'|'+m.date+'|'+champ]=pos;
      });
    });
  });
  return{stats:stats,champPos:champPos,matchPos:matchPos};
}

// 포지션 이니셜 — 박스 없이 컬러 텍스트만 (등급 배지와 시각적 구분)
function posTag(pos){
  if(!pos)return'';
  var col=POS_COL[pos]||'#94a3b8';
  return'<span style="font-size:.68rem;font-weight:900;color:'+col
    +';opacity:.9;flex-shrink:0;vertical-align:middle">'+pos+'</span>';
}
// 포지션 라벨 — 선수 카드 바 차트 전용 (posTag와 동일 스타일, 별칭)
function posTagBox(pos){
  return posTag(pos);
}

// 선수의 주요 포지션 배열 (출전 비중 ≥15% 기준, 빈도 높은 순)
function getDataPositions(playerName){
  var pd=window._posData;
  if(!pd||!pd.stats[playerName])return null;
  var st=pd.stats[playerName];
  var total=(st.T||0)+(st.J||0)+(st.M||0)+(st.B||0)+(st.S||0);
  if(!total)return null;
  var pos=['T','J','M','B','S'].filter(function(p){return(st[p]||0)/total>=0.15;});
  pos.sort(function(a,b){return(st[b]||0)-(st[a]||0);});
  return pos.length?pos:null;
}

// 챔피언의 주요 포지션 태그들 (해당 선수 기준)
function champPosTagHtml(player,champ){
  var pd=window._posData;if(!pd)return'';
  var cp=pd.champPos[player+'|'+champ];if(!cp)return'';
  var total=(cp.T||0)+(cp.J||0)+(cp.M||0)+(cp.B||0)+(cp.S||0);
  if(!total)return'';
  var dominant=['T','J','M','B','S'].filter(function(p){return(cp[p]||0)/total>=0.2;});
  dominant.sort(function(a,b){return(cp[b]||0)-(cp[a]||0);});
  return dominant.slice(0,2).map(posTag).join('');
}

// ── 대진표 최적화 헬퍼 ────────────────────────────────────────────
// 포지션 적합도: 주포지션(출전 1위)=4 / 2위=3 / 소화 가능=2 / 미경험=0 / 데이터 없음=2(중립)
function rosterFit(p,pos){
  if(!p.positions||!p.positions.length)return 2;
  var idx=p.positions.indexOf(pos);
  if(idx<0)return 0;
  return idx===0?4:idx===1?3:2;
}
// 팀 내 최적 포지션 배정: 전 순열 탐색(팀원 ≤5 → ≤120가지)으로 적합도 합 최대화
function rosterBestAssign(team,posOrder){
  var n=posOrder.length;
  var best=null,bestFit=-1;
  var perm=[],used=new Array(team.length);
  (function go(depth,fitSum){
    if(depth===n){
      if(fitSum>bestFit){bestFit=fitSum;best=perm.slice();}
      return;
    }
    for(var i=0;i<team.length;i++){
      if(used[i])continue;
      used[i]=true;perm.push(i);
      go(depth+1,fitSum+rosterFit(team[i],posOrder[depth]));
      perm.pop();used[i]=false;
    }
  })(0,0);
  var res={};
  if(best)best.forEach(function(pi,d){res[posOrder[d]]=team[pi];});
  return{assign:res,fit:bestFit};
}
// 맞라인 점수 격차 합산 (복합점수 기준)
function rosterLaneCost(t1,t2,posOrder){
  var s=0;
  posOrder.forEach(function(pos){
    if(t1[pos]&&t2[pos])s+=Math.abs(t1[pos].score-t2[pos].score);
  });
  return s;
}
// 맞라인 개선 스왑: 적합도를 해치지 않는 범위에서 라인별 점수차 축소
function rosterLaneSwapPass(t1,t2,posOrder){
  var improved=true,maxIter=30;
  while(improved&&maxIter-->0){
    improved=false;
    [t1,t2].forEach(function(team){
      var opp=team===t1?t2:t1;
      for(var i=0;i<posOrder.length;i++){
        for(var j=i+1;j<posOrder.length;j++){
          var pi=posOrder[i],pj=posOrder[j];
          var a=team[pi],b=team[pj];
          if(!a||!b)continue;
          var fitBefore=rosterFit(a,pi)+rosterFit(b,pj);
          var fitAfter=rosterFit(b,pi)+rosterFit(a,pj);
          if(fitAfter<fitBefore)continue; // 포지션 적합도 훼손 금지
          var before=(opp[pi]?Math.abs(a.score-opp[pi].score):0)+(opp[pj]?Math.abs(b.score-opp[pj].score):0);
          var after=(opp[pi]?Math.abs(b.score-opp[pi].score):0)+(opp[pj]?Math.abs(a.score-opp[pj].score):0);
          if(after<before-1){team[pi]=b;team[pj]=a;improved=true;}
        }
      }
    });
  }
}
// k-조합 열거
function rosterCombos(n,k){
  var res=[],idx=[];
  (function go(start){
    if(idx.length===k){res.push(idx.slice());return;}
    for(var i=start;i<n;i++){idx.push(i);go(i+1);idx.pop();}
  })(0);
  return res;
}

window.generateRoster=function(){
  var checks=document.querySelectorAll('.roster-check:checked');
  var selected=Array.from(checks).map(function(c){return c.value;});
  if(selected.length<6){alert('최소 6명을 선택해주세요.');return;}

  // 최근 폼: 선수별 최근 10경기 승률 (옵션)
  var useRecent=!!(document.getElementById('roster-recent-form')&&document.getElementById('roster-recent-form').checked);
  var recentWR={};
  if(useRecent&&window._mlGames){
    var byPlayer={};
    window._mlGames.forEach(function(g){
      if(!byPlayer[g.name])byPlayer[g.name]=[];
      byPlayer[g.name].push(g);
    });
    Object.keys(byPlayer).forEach(function(nm){
      var gs=byPlayer[nm].sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,10);
      var w=gs.filter(function(g){return g.win;}).length;
      recentWR[nm]=(w+2)/(gs.length+4); // 소표본 베이지안 보정
    });
  }

  // 선수별 복합 점수 (결정적 — 랜덤 노이즈 없음)
  // 복합점수 = STAT SCORE 50% + 보정승률(0~600 환산) 50%
  // 최근 폼 반영 시: 위 복합점수 70% + 최근 10경기 보정승률 30%
  var playerData=selected.map(function(nm){
    var rs=window._radarStats&&window._radarStats[nm];
    var ss=rs?((rs.atk||0)+(rs.survive||0)+(rs.teamwork||0)+(rs.compete||0)+(rs.stability||0)+(rs.champPool||0)):300;
    var d6d=window._d6data&&window._d6data.find(function(p){return p.name===nm;})||{wins:0,games:0};
    var d5d=d25.find(function(p){return p.name===nm;})||{wins:0,games:0};
    var d4d=d24.find(function(p){return p.name===nm;})||{wins:0,games:0};
    // 연도별 가중 승률 (2026×5, 2025×2, 2024×0.5) + 베이지안 스무딩 (0판→50%)
    var wWins=(d6d.wins||0)*5+(d5d.wins||0)*2+(d4d.wins||0)*0.5;
    var wGames=(d6d.games||0)*5+(d5d.games||0)*2+(d4d.games||0)*0.5;
    var adjWR=(wWins+5)/(wGames+10);
    var composite=ss*0.5+(adjWR*600)*0.5;
    if(useRecent&&recentWR[nm]!=null)composite=composite*0.7+(recentWR[nm]*600)*0.3;
    var a=AN[nm]||{p:''};
    var dataPos=getDataPositions(nm);
    return{name:nm,score:composite,rawScore:ss,wr:Math.round(adjWR*100),positions:dataPos&&dataPos.length?dataPos:parsePosString(a.p)};
  });

  var n=playerData.length;
  var teamSize=Math.min(Math.floor(n/2),5);
  var posOrder=teamSize>=5?['T','J','M','B','S']:teamSize===4?['T','J','M','B']:['T','M','B'];
  var benchN=n-teamSize*2;

  // ── 전수 탐색: (벤치 조합 ×) 팀 분할 전체를 평가 ──────────────────
  // 비용 = 팀 점수차 + 맞라인 격차×0.3 + 비선호 포지션 배정×100
  var benchCombos=benchN>0?rosterCombos(n,benchN):[[]];
  if(benchCombos.length>120){ // 인원이 많으면 벤치 조합 무작위 샘플링
    for(var bi=benchCombos.length-1;bi>0;bi--){var bj=Math.floor(Math.random()*(bi+1));var bt=benchCombos[bi];benchCombos[bi]=benchCombos[bj];benchCombos[bj]=bt;}
    benchCombos=benchCombos.slice(0,120);
  }
  var candidates=[],assignCache={},evalCount=0;
  benchCombos.forEach(function(benchIdx){
    var benchSet={};benchIdx.forEach(function(i){benchSet[i]=true;});
    var playing=playerData.filter(function(_,i){return!benchSet[i];});
    // 팀 분할: 첫 번째 선수를 1팀에 고정해 중복 제거 → C(2k-1, k-1)가지
    var rest=playing.slice(1);
    rosterCombos(rest.length,teamSize-1).forEach(function(idxs){
      var inT1={};idxs.forEach(function(i){inT1[i]=true;});
      var team1=[playing[0]],team2=[];
      rest.forEach(function(p,i){if(inT1[i])team1.push(p);else team2.push(p);});
      evalCount++;
      var s1=team1.reduce(function(s,p){return s+p.score;},0);
      var s2=team2.reduce(function(s,p){return s+p.score;},0);
      var scoreDiff=Math.abs(s1-s2);
      if(scoreDiff>Math.max(s1,s2)*0.12)return; // 명백한 불균형은 조기 탈락
      // 동일 팀 구성의 포지션 배정은 캐시 재사용 (벤치 조합 간 중복 다수)
      function cachedAssign(team){
        var ck=team.map(function(p){return p.name;}).sort().join('|');
        if(!assignCache[ck])assignCache[ck]=rosterBestAssign(team,posOrder).assign;
        var src=assignCache[ck],copy={};
        posOrder.forEach(function(pos){if(src[pos])copy[pos]=src[pos];});
        return copy;
      }
      var t1=cachedAssign(team1),t2=cachedAssign(team2);
      rosterLaneSwapPass(t1,t2,posOrder);
      // 비선호 포지션 배정 수
      var offPos=0;
      posOrder.forEach(function(pos){
        if(t1[pos]&&rosterFit(t1[pos],pos)===0)offPos++;
        if(t2[pos]&&rosterFit(t2[pos],pos)===0)offPos++;
      });
      var laneCost=rosterLaneCost(t1,t2,posOrder);
      var cost=scoreDiff+laneCost*0.3+offPos*100;
      var key=team1.map(function(p){return p.name;}).sort().join(',')+'/'+benchIdx.join('.');
      candidates.push({t1:t1,t2:t2,s1:s1,s2:s2,cost:cost,key:key,
        subs:playerData.filter(function(_,i){return benchSet[i];})});
    });
  });
  if(!candidates.length){alert('가능한 조합을 찾지 못했습니다.');return;}
  candidates.sort(function(a,b){return a.cost-b.cost;});

  // 균형 상위 후보 풀에서 무작위 선택 → 매번 다르지만 항상 균형 보장
  var bestCost=candidates[0].cost;
  var pool=candidates.filter(function(c){return c.cost<=bestCost+60;});
  if(pool.length<5)pool=candidates.slice(0,Math.min(5,candidates.length));
  // 직전 결과 제외 (다시 뽑기 체감 다양성)
  if(window._lastRosterKey&&pool.length>1){
    var filtered=pool.filter(function(c){return c.key!==window._lastRosterKey;});
    if(filtered.length)pool=filtered;
  }
  var picked=pool[Math.floor(Math.random()*pool.length)];
  window._lastRosterKey=picked.key;

  var t1=picked.t1,t2=picked.t2,subs=picked.subs;
  var t1Total=picked.s1,t2Total=picked.s2;
  var balance=Math.round(Math.min(t1Total,t2Total)/Math.max(t1Total,t2Total)*100);
  // 예상 승률: 팀 복합점수 차 → Elo 로지스틱 환산 (스케일 600 = 점수차 50 ≈ 55%)
  var winProb1=Math.round(1/(1+Math.pow(10,-(t1Total-t2Total)/600))*100);

  window._rosterResult={t1:t1,t2:t2,subs:subs,positions:posOrder,t1Total:t1Total,t2Total:t2Total,poolSize:pool.length,totalCombos:evalCount};

  // 결과 렌더
  var posLabel={T:'탑',J:'정글',M:'미드',B:'원딜',S:'서폿'};
  var balCol=balance>=95?'#4ade80':balance>=85?'#fbbf24':'#f87171';
  var rows=posOrder.map(function(pos){
    var p1=t1[pos],p2=t2[pos];
    var diff=p1&&p2?Math.abs(p1.score-p2.score):0;
    var mismatch=diff>120; // 복합점수 120점(선수 평균의 ~40%) 이상 격차
    var diffCol=diff>120?'#fbbf24':diff>60?'#94a3b8':'#475569';
    return'<tr style="'+(mismatch?'background:rgba(251,191,36,.05)':'')+'">'
      +'<td class="roster-pos" style="text-align:center">'+pos+'<div style="font-size:.62rem;color:#334155">'+posLabel[pos]+'</div></td>'
      +'<td style="text-align:right;padding-right:24px">'+(p1?at(AN[p1.name]?AN[p1.name].t:'B')+' <b class="roster-player">'+p1.name+'</b>':'<span style="color:#334155">?</span>')+'</td>'
      +'<td style="text-align:center;font-size:.75rem;color:'+diffCol+'" title="맞라인 복합점수 격차">'+(mismatch?'<span style="color:#fbbf24;font-size:.9rem">⚠️</span> ':'')+(p1&&p2?'±'+Math.round(diff):'vs')+'</td>'
      +'<td style="padding-left:24px">'+(p2?at(AN[p2.name]?AN[p2.name].t:'B')+' <b class="roster-player">'+p2.name+'</b>':'<span style="color:#334155">?</span>')+'</td>'
    +'</tr>';
  }).join('');

  var subsHtml='';
  if(subs.length){
    subsHtml='<div style="margin-top:16px;padding:14px 16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid #334155">'
      +'<div style="font-size:.75rem;font-weight:700;color:#64748b;margin-bottom:10px">🔄 식스맨 (대기)</div>'

      +subs.map(function(s){

          +'<span style="font-weight:700;font-size:.82rem;color:#f1f5f9">'+s.name+'</span>'
          +'<span style="font-size:.68rem;color:#475569">'+s.positions.join('/')+'</span>'
        +'</div>';
      }).join('')
      +'</div></div>';
  }

  var infoHtml=''
    +'<div style="margin-top:16px;padding:16px 18px;background:#0f172a;border-radius:12px;border:1px solid #1e293b">'
      +'<div style="font-size:.72rem;font-weight:700;color:#475569;letter-spacing:.05em;margin-bottom:12px">📊 스코어 산출 방식</div>'
      +'<div style="display:flex;flex-direction:column;gap:10px">'

        // 팀 스코어
        +'<div style="padding:12px 14px;background:#1e293b;border-radius:10px;border-left:3px solid #818cf8">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'

            +'선수별 <b style="color:#e2e8f0">복합점수(레이더 STAT SCORE 50% + 보정승률 50%)</b>를 합산한 값입니다. '
            +'팀 배정에 쓰는 점수와 동일한 기준이라, 표시되는 균형%가 실제 배정 품질을 그대로 반영합니다.'
          +'</div>'
        +'</div>'

        // 전력 균형
        +'<div style="padding:12px 14px;background:#1e293b;border-radius:10px;border-left:3px solid '+balCol+'">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
            +'<span style="font-size:.8rem;font-weight:700;color:'+balCol+'">전력 균형 '+balance+'%</span>'
            +'<span style="font-size:.68rem;color:#475569;background:#0f172a;padding:1px 8px;border-radius:6px">'+(balance>=95?'매우 균형 ✅':balance>=85?'양호 🟡':'불균형 ⚠️')+'</span>'
          +'</div>'
          +'<div style="font-size:.75rem;color:#94a3b8;line-height:1.6">'
            +'낮은 팀 스코어 ÷ 높은 팀 스코어 × 100으로 계산합니다. '

window.copyRoster=function(){
  var r=window._rosterResult;
  if(!r){return;}
  var posLabel={T:'T',J:'J',M:'M',B:'B',S:'S'};
  var lines=['🎮 런치롤탐 대진표','──────────────────'];
  var maxLen=r.positions.reduce(function(m,p){
    var n1=r.t1[p]?r.t1[p].name.length:1;
    var n2=r.t2[p]?r.t2[p].name.length:1;
    return Math.max(m,n1,n2);
  },0);
  r.positions.forEach(function(pos){
    var p1=r.t1[pos]?r.t1[pos].name:'?';
    var p2=r.t2[pos]?r.t2[pos].name:'?';
    var pad=p1+' '.repeat(Math.max(0,maxLen-p1.length+2));
    lines.push(pos+'  '+pad+p2);
  });
  lines.push('──────────────────');
  lines.push('⚖️ 1팀 '+Math.round(r.t1Total)+' vs 2팀 '+Math.round(r.t2Total)+'  (균형 '+Math.round(Math.min(r.t1Total,r.t2Total)/Math.max(r.t1Total,r.t2Total)*100)+'%)');
  var _wp1=Math.round(1/(1+Math.pow(10,-(r.t1Total-r.t2Total)/600))*100);
  lines.push('📈 예상 승률 | 1팀 '+_wp1+'% : '+(100-_wp1)+'% 2팀');
  if(r.subs.length){
    lines.push('');
    lines.push('🔄 식스맨');
    r.subs.forEach(function(s){lines.push(s.positions.join('/')+' '+s.name);});
  }
  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    var btn=document.getElementById('roster-copy-btn');
    btn.textContent='✅ 복사 완료!';
    setTimeout(function(){btn.textContent='📋 슬랙 공유';},2000);
  });
};

function parseInsightsCSV(csv){
  if(!csv)return{synergy:[],rivals:[],champAwards:[],topKDA:[],topDmgDealt:[],topDmgTaken:[],recentAwards:[]};
  // pCSV를 사용해 quoted comma("105,271" 같은 천 단위 구분자)를 올바르게 파싱
  var rows=pCSV(csv);
  var section=null;
  var d={synergy:[],rivals:[],champAwards:[],topKDA:[],topDmgDealt:[],topDmgTaken:[],recentAwards:[],matchLog:[]};
  function toN(v){var s=String(v||0).trim();if(s==='1899-12-30')return 0;if(s==='1899-12-31')return 1;var n=+s.replace(/,/g,'');return isNaN(n)?0:n;}
  rows.forEach(function(cols){
    if(!cols||cols.length===0)return;
    var f=(cols[0]||'').trim();
    if(!f)return;
    if(f.indexOf('## SYNERGY')===0){section='syn';return;}
    if(f.indexOf('## RIVALS')===0){section='riv';return;}
    if(f.indexOf('## CHAMP_AWARDS')===0){section='ca';return;}
    if(f.indexOf('## TOP_KDA')===0){section='kda';return;}
    if(f.indexOf('## TOP_DMG_DEALT')===0){section='dld';return;}
    if(f.indexOf('## TOP_DMG_TAKEN')===0){section='dlt';return;}
    if(f.indexOf('## RECENT_AWARDS')===0){section='rec';return;}
    if(f.indexOf('## MATCH_LOG')===0){section='mlog';return;}
    if(f.indexOf('## ')===0){section=null;return;}
    if(f==='선수1'||f==='선수'||f==='날짜')return;
    var c=cols.map(function(v){return(v||'').trim();});
    switch(section){
      case'syn': d.synergy.push({p1:c[0],p2:c[1],together:toN(c[2]),wins:toN(c[3]),wr:toN(c[4])});break;
      case'riv': d.rivals.push({p1:c[0],p2:c[1],count:toN(c[2]),w1:toN(c[3]),w2:toN(c[4])});break;
      case'ca':  d.champAwards.push({player:c[0],champ:c[1],mom:toN(c[2]),special:toN(c[3]),spirit:toN(c[4]),total:toN(c[5])});break;
      case'kda': d.topKDA.push({player:c[0],champ:c[1],k:toN(c[2]),d:toN(c[3]),a:toN(c[4]),kda:toN(c[5]),date:c[6],won:c[7],year:c[8]});break;
      case'dld': d.topDmgDealt.push({player:c[0],champ:c[1],val:toN(c[2]),date:c[3],won:c[4],year:c[5]});break;
      case'dlt': d.topDmgTaken.push({player:c[0],champ:c[1],val:toN(c[2]),date:c[3],won:c[4],year:c[5]});break;
      case'rec': d.recentAwards.push({date:c[0],player:c[1],type:c[2]});break;
      case'mlog': if(c[0]&&c[2]) d.matchLog.push({date:c[0],year:c[1],result:c[2],team1:c[3],team2:c[4],mom:c[5],special:c[6],spirit:c[7],playerKda:c[8],duration:c[9]||''});break;
    }
  });
  return d;
}

// ── 경기 로그 헬퍼 ────────────────────────────────────────────────
function parseTeam(str){
  if(!str)return[];
  return str.split('|').map(function(s){
    var m=s.match(/^(.+)\((.+)\)$/);
    return m?{player:m[1].trim(),champ:m[2].trim()}:null;
  }).filter(Boolean);
}
function parseAward(str){
  if(!str)return null;
  var m=str.match(/^(.+)\((.+)\)$/);
  return m?{player:m[1].trim(),champ:m[2].trim()}:null;
}

  var awardIconMap={};
  if(mom) awardIconMap[mom.player]='👑';
  if(spc) awardIconMap[spc.player]='⭐';
  if(spi) awardIconMap[spi.player]='💪';

  // 2026 전용: 전체 딜량/받은피해량 최댓값 (바 정규화 기준)
  var allPlayers2026=t1.concat(t2);
  var maxDdealt=Math.max.apply(null,allPlayers2026.map(function(p){var k=kdaMap[p.player];return k&&k.ddealt?k.ddealt:0;}).concat([1]));
  var maxDtaken=Math.max.apply(null,allPlayers2026.map(function(p){var k=kdaMap[p.player];return k&&k.dtaken?k.dtaken:0;}).concat([1]));

  function playerRow(p, isWinner, teamMaxKA, posIdx, posArr, teamK, teamDmg){
    var inAN=AN[p.player];
    var kda=kdaMap[p.player];
    var ka=kda?(kda.k+kda.a):0;
    var barPct=teamMaxKA>0?Math.min(100,Math.round(ka/teamMaxKA*100)):0;
    var kShare=ka>0?Math.round(kda.k/ka*100):0;
    var kdaCol=kdaColor(kda);
    var posStr=(posIdx!==undefined&&posArr)?posTag(posArr[posIdx]||''):'';
    // 프로씬 지표: 킬관여율 KP% (팀 킬 대비 K+A), 딜지분 DMG% (팀 딜량 대비)
    var kpStr=(kda&&teamK>0)?'<span style="color:#818cf8;font-size:.66rem;margin-left:6px" title="킬관여율 — 팀 킬 중 킬/어시스트로 관여한 비율">KP '+Math.round(ka/teamK*100)+'%</span>':'';
    var dmgShareStr=(kda&&kda.ddealt&&teamDmg>0)?'<span style="color:#fb923c;font-size:.66rem;margin-left:5px" title="딜지분 — 팀 전체 딜량 중 비율">딜 '+Math.round(kda.ddealt/teamDmg*100)+'%</span>':'';

    return'<div style="padding:8px 0;border-bottom:1px solid rgba(51,65,85,.22)">'
      // 1줄: 챔프아이콘 + 포지션 + 등급 + 선수명 + 수상아이콘 + KDA 뱃지
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        +champIcon(p.champ,24)+posStr
        +(inAN?at(inAN.t):'')
        +'<span style="font-size:.82rem;font-weight:700;color:#f1f5f9;flex:1">'+p.player+'</span>'
        +(awardIconMap[p.player]?'<span style="font-size:.8rem">'+awardIconMap[p.player]+'</span>':'')
        +(kda?'<span class="tip-icon" data-tip-id="popup-kda" style="font-size:.78rem;font-weight:900;color:'+kdaCol
          +';background:rgba(255,255,255,.06);padding:1px 8px;border-radius:4px;cursor:pointer;width:auto;border:none">'
          +kda.kda+(kda.d===0?'<span style="font-size:.6rem;color:#a78bfa;margin-left:2px">PD</span>':'')
        +'</span>':'')
      +'</div>'
      // 2줄: K/D/A 숫자
      +(kda
        ?'<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:.75rem;padding-left:30px">'
          +'<b style="color:#4ade80">'+kda.k+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#f87171">'+kda.d+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#60a5fa">'+kda.a+'</b>'
          +'<span style="color:#94a3b8;font-size:.68rem;margin-left:4px">'+p.champ+'</span>'
          +kpStr+dmgShareStr
        +'</div>'
        :'<div style="font-size:.68rem;color:#94a3b8;padding-left:30px;margin-bottom:5px">'+p.champ+' · 데이터 없음</div>'
      )
      // 3줄: K+A 기여도 바 — 팀 내 킬·어시스트 기여 비율
      +'<div class="tip-icon" data-tip-id="popup-bar" style="display:flex;align-items:center;gap:6px;padding-left:30px;margin-bottom:'+(is2026&&kda&&kda.dpm?'6px':'0')+';cursor:pointer;width:auto;border:none">'
        +'<div style="flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden">'
          +(barPct>0
            ?'<div style="height:100%;border-radius:3px;display:flex;width:'+barPct+'%">'
              +'<div style="width:'+kShare+'%;background:#4ade80;min-width:'+(kda&&kda.k>0?2:0)+'px"></div>'
              +'<div style="flex:1;background:#60a5fa"></div>'
            +'</div>'
            :'')
        +'</div>'
        +'<span style="font-size:.64rem;color:#475569;min-width:20px;text-align:right">'+(kda?ka:'')+'</span>'
      +'</div>'
      // 2026 전용: 가한 피해량 / 받은 피해량 바 (흐릿하게 — 정보 강약 조절)
      +(is2026&&kda&&(kda.ddealt||kda.dtaken)
        ?(function(){
          function dmgBar(label,val,max,col){
            var pct=max>0?Math.min(100,Math.round(val/max*100)):0;
            return'<div style="display:flex;align-items:center;gap:5px;padding-left:30px;opacity:.45">'
              +'<span style="font-size:.6rem;color:'+col+';min-width:42px">'+label+'</span>'
              +'<div style="flex:1;height:3px;background:#1e293b;border-radius:2px;overflow:hidden">'
                +'<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:2px"></div>'
              +'</div>'
              +'<span style="font-size:.62rem;color:'+col+';min-width:48px;text-align:right">'+(val>0?val.toLocaleString():'—')+'</span>'
            +'</div>';
          }
          return'<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">'
            +(kda.ddealt?dmgBar('가한피해',kda.ddealt,maxDdealt,'#fb923c'):'')
            +(kda.dtaken?dmgBar('받은피해',kda.dtaken,maxDtaken,'#818cf8'):'')
          +'</div>';
        })()
        :'')
    +'</div>';
  }

  function teamBlock(players, isWinner, label){
    var borderCol=isWinner?winCol:loseCol;
    // 팀 내 최대 K+A (바 정규화 기준) + 팀 합계 (KP%·딜지분 분모)
    var teamMaxKA=1,teamK=0,teamDmg=0;
    players.forEach(function(p){
      var kd=kdaMap[p.player];if(!kd)return;
      if(kd.k+kd.a>teamMaxKA)teamMaxKA=kd.k+kd.a;
      teamK+=kd.k;teamDmg+=kd.ddealt||0;
    });
    var posArr=_POS_MAP[players.length]||_POS_MAP[5];
    return'<div style="flex:1;min-width:220px;background:rgba(255,255,255,.03);border-radius:10px;border:1.5px solid '
      +borderCol+';padding:12px 14px">'
      +'<div style="font-size:.72rem;font-weight:800;color:'+borderCol+';margin-bottom:10px;display:flex;align-items:center;gap:6px">'
        +label+(isWinner?' <span style="background:'+winCol+';color:#0f172a;border-radius:4px;padding:1px 6px;font-size:.65rem">승</span>':'')
        +''
      +'</div>'
      +players.map(function(p,i){return playerRow(p,isWinner,teamMaxKA,i,posArr,teamK,teamDmg);}).join('')
    +'</div>';
  }

  function awardRow(a, icon, col, label){
    if(!a)return'';
    return'<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;border-left:3px solid '+col+'">'
      +'<span style="font-size:1.1rem">'+icon+'</span>'
      +'<div style="flex:1">'
        +'<div style="font-size:.7rem;color:'+col+';font-weight:700">'+label+'</div>'
        +'<div style="font-size:.85rem;font-weight:800;color:#f1f5f9">'+a.player
          +' <span style="font-weight:400;color:#64748b;font-size:.78rem">('+a.champ+')</span></div>'
      +'</div>'
      +champIcon(a.champ,32)
    +'</div>';
  }

  var hasStats=Object.keys(kdaMap).length>0||Object.keys(dmgMap).length>0;

  // 경기 시간 포맷 변환 (mm:ss → mm분 ss초 / h:mm:ss → hh분 mm초 or h시간 mm분 ss초)
  function fmtDuration(s){
    if(!s)return'';
    var p=s.split(':');
    if(p.length===2)return (+p[0])+'분 '+(+p[1])+'초';
    if(p.length===3){
      // h:mm:ss 형식 — h<=2 이면 진짜 h시간, 아니면 mm:ss:00 잔류값
      if(+p[0]<=2&&+p[0]>0)return p[0]+'시간 '+(+p[1])+'분 '+(+p[2])+'초';
      return (+p[0])+'분 '+(+p[1])+'초'; // mm:ss:00 잔류 대응
    }
    return s;
  }
  var durStr=fmtDuration(match.duration||'');

  // 팀(1팀/2팀) 로스터가 메모에 없을 때: 팀 구분 없이 전 선수 스탯만 단일 블록으로 표시
  function rosterlessBlock(){
    var names=Object.keys(kdaMap);
    if(!names.length)return'<div style="flex:1;color:#64748b;font-size:.8rem;padding:12px">선수 기록이 없습니다.</div>';
    names.sort(function(a,b){var ka=kdaMap[a],kb=kdaMap[b];return (kb.kda||0)-(ka.kda||0);});
    var maxKA=1;names.forEach(function(n){var s=kdaMap[n];if(s.k+s.a>maxKA)maxKA=s.k+s.a;});
    var rows=names.map(function(nm){
      var kda=kdaMap[nm];var ka=kda.k+kda.a;var kdaCol=kdaColor(kda);
      var inAN=AN[nm];
      return'<div style="padding:7px 0;border-bottom:1px solid rgba(51,65,85,.22)">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
          +(inAN?at(inAN.t):'')
          +'<span style="font-size:.82rem;font-weight:700;color:#f1f5f9;flex:1">'+nm+'</span>'
          +(awardIconMap[nm]?'<span style="font-size:.8rem">'+awardIconMap[nm]+'</span>':'')
          +'<span style="font-size:.78rem;font-weight:900;color:'+kdaCol+';background:rgba(255,255,255,.06);padding:1px 8px;border-radius:4px">'+kda.kda+(kda.d===0?' PD':'')+'</span>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:5px;font-size:.75rem;padding-left:2px">'
          +'<b style="color:#4ade80">'+kda.k+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#f87171">'+kda.d+'</b><span style="color:#334155">/</span>'
          +'<b style="color:#60a5fa">'+kda.a+'</b>'
          +(is2026&&kda.ddealt?'<span style="color:#fb923c;font-size:.68rem;margin-left:6px">딜 '+kda.ddealt.toLocaleString()+'</span>':'')
        +'</div>'
      +'</div>';
    }).join('');
    return'<div style="flex:1;min-width:220px;background:rgba(255,255,255,.03);border-radius:10px;border:1.5px solid #334155;padding:12px 14px">'
      +'<div style="font-size:.72rem;font-weight:800;color:#fbbf24;margin-bottom:4px">⚠️ 팀 로스터 미기록</div>'
      +'<div style="font-size:.66rem;color:#64748b;margin-bottom:10px;line-height:1.5">경기 메모에 <b style="color:#94a3b8">1팀:/2팀:</b> 로스터가 없어 팀을 구분할 수 없습니다. 전체 선수 기록만 표시합니다.</div>'
      +rows
    +'</div>';
  }

  return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
    +'<span style="font-size:.72rem;color:'+yearCol+';font-weight:700">'+match.year+'시즌</span>'
    +''
    +'</div>'
    +'<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:16px">'
      +'<span style="font-size:1.3rem;font-weight:900;color:#f1f5f9">'+match.date+'</span>'
      +'<span style="font-size:.85rem;font-weight:500;color:'+(win1?winCol:'#f87171')+'">'+match.result+'</span>'
      +(durStr?'<span style="font-size:.75rem;color:#475569">⏱ '+durStr+'</span>':'')
    +'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">'
      +((t1.length||t2.length)
        ?teamBlock(t1,win1,'1팀')+teamBlock(t2,!win1,'2팀')
        :rosterlessBlock())
    +'</div>'
    +''
    +'<div style="font-size:.78rem;font-weight:800;color:#94a3b8;margin-bottom:8px;letter-spacing:.5px">🏅 수상</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'
      +awardRow(mom,'👑','#fbbf24','MOM — 승리의 인도자')
      +awardRow(spc,'⭐','#818cf8','스페셜 — 숨겨진 조력자')
      +awardRow(spi,'💪','#f472b6','투혼상 — 비운의 에이스')
    +'</div>';
}

function renderMatchLogPage(insights){
  if(!insights||!insights.matchLog||!insights.matchLog.length){
    return'<div class="spinner">💡 Apps Script에서 🚀 전체 데이터 추출을 실행해주세요.</div>';
  }
  var YCOL={'2026':'#818cf8','2025':'#34d399','2024':'#fb923c'};
  var yearCounts={};
  insights.matchLog.forEach(function(m){yearCounts[m.year]=(yearCounts[m.year]||0)+1;});

  // 상단 요약 뱃지
  var summary='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">'
    +['2026','2025','2024'].map(function(y){
      var col=YCOL[y]||'#94a3b8';
      return'<div style="padding:6px 14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid '+col+';font-size:.78rem">'
        +'<span style="color:'+col+';font-weight:700">'+y+'</span>'
        +'<span style="color:#64748b"> · '+(yearCounts[y]||0)+'경기</span></div>';
    }).join('')
    +'<div style="padding:6px 14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid #334155;font-size:.78rem;margin-left:auto">'
      +'총 <b style="color:#f1f5f9">'+insights.matchLog.length+'</b>경기</div>'
    +'</div>';

  // 타임라인 — 시즌별 그룹핑, 최신순
  var byYear={'2026':[],'2025':[],'2024':[]};
  insights.matchLog.forEach(function(m,idx){
    if(byYear[m.year])byYear[m.year].push({m:m,idx:idx});
  });

  var timeline=['2026','2025','2024'].map(function(y){
    var games=byYear[y];
    if(!games||!games.length)return'';
    var col=YCOL[y]||'#94a3b8';
    var rows=games.map(function(g){
      var m=g.m, idx=g.idx;
      var t1=parseTeam(m.team1), t2=parseTeam(m.team2);
      var win1=m.result==='1팀 승';
      var resCol=win1?'#4ade80':'#f87171';
      var mom=parseAward(m.mom), spc=parseAward(m.special), spi=parseAward(m.spirit);

      var icons1=t1.slice(0,5).map(function(p){return champIcon(p.champ,22);}).join('');
      var icons2=t2.slice(0,5).map(function(p){return champIcon(p.champ,22);}).join('');

      // 수상 3명 한줄 표기
      var awards='';
      if(mom)awards+='<span style="font-size:.72rem;color:#64748b">👑<span style="color:#fbbf24;font-weight:700"> '+mom.player+'</span></span>';
      if(spc)awards+='<span style="font-size:.72rem;color:#64748b;margin-left:8px">⭐<span style="color:#818cf8;font-weight:700"> '+spc.player+'</span></span>';
      if(spi)awards+='<span style="font-size:.72rem;color:#64748b;margin-left:8px">💪<span style="color:#f472b6;font-weight:700"> '+spi.player+'</span></span>';

      return'<div onclick="showMatchPopup('+idx+')" '
        +'style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#1e293b;border-radius:10px;'
        +'border:1px solid #334155;cursor:pointer;transition:.15s;flex-wrap:wrap" '
        +'onmouseover="this.style.borderColor=\''+col+'\'" onmouseout="this.style.borderColor=\'#334155\'">'
        // 날짜
        +'<div style="min-width:88px;flex-shrink:0">'
          +'<div style="font-size:.82rem;font-weight:800;color:#f1f5f9">'+m.date.slice(5)+'</div>'
          +'<div style="font-size:.68rem;color:#475569">'+m.date.slice(0,4)+'</div>'
        +'</div>'
        // 결과
        +'<div style="min-width:44px;flex-shrink:0;text-align:center">'
          +'<span style="font-size:.72rem;font-weight:800;color:'+resCol+';background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px">'+m.result+'</span>'
        +'</div>'
        // 팀 아이콘
        +'<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:200px">'
          +'<div style="display:flex;gap:2px;border-right:1px solid #334155;padding-right:8px">'+icons1+'</div>'
          +'<span style="font-size:.7rem;color:#475569;flex-shrink:0">vs</span>'
          +'<div style="display:flex;gap:2px">'+icons2+'</div>'
        +'</div>'
        // 수상 3명
        +(awards?'<div style="display:flex;gap:0;flex-shrink:0;flex-wrap:wrap">'+awards+'</div>':'')
      +'</div>';
    }).join('');

    return'<div style="margin-bottom:24px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
        +'<div style="width:3px;height:20px;background:'+col+';border-radius:2px"></div>'
        +'<span style="font-size:1rem;font-weight:900;color:'+col+'">'+y+'시즌</span>'
        +'<span style="font-size:.75rem;color:#475569">'+games.length+'경기</span>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div>'
    +'</div>';
  }).join('');

  return summary+timeline;
}

function renderSynergyPage(insights){
  if(!insights||!insights.synergy.length){
    return'<div class="spinner">💡 Apps Script에서 🔥 인사이트 데이터 추출을 실행해주세요.</div>';
  }
  var synInfo='<div style="margin-bottom:10px;padding:8px 14px;background:#1e293b;border-radius:8px;border-left:3px solid #818cf8;font-size:.82rem;color:#94a3b8">🤝 선수별 베스트 파트너 요약 · 선수 행 클릭 시 전체 목록 펼쳐져요 (최소 5경기 이상 기준)</div>';
  var synRows='';
  ALL.forEach(function(p){
    var pairs=insights.synergy.filter(function(s){return(s.p1===p||s.p2===p)&&s.together>=5;})
      .map(function(s){var partner=s.p1===p?s.p2:s.p1;return{partner:partner,together:s.together,wins:s.wins,wr:s.wr};})
      .sort(function(a,b){return b.wr-a.wr;});
    var best=pairs[0];
    var wrCol=best?(best.wr>=60?'#4ade80':best.wr>=50?'#60a5fa':'#f87171'):'#475569';
    var uid='syn-'+p.replace(/\s/g,'_');
    var partnerBadge=best?(at(AN[best.partner]?AN[best.partner].t:'B')+' '+best.partner):'—';
    synRows+='<tr style="cursor:pointer" onclick="toggleSynRow(\''+uid+'\',\''+p+'\')">'
      +'<td class="nm" style="font-weight:800">'+at(AN[p]?AN[p].t:'B')+' '+p+'</td>'
      +'<td class="nm" style="color:#f1f5f9">'+partnerBadge+'</td>'
      +'<td style="color:'+wrCol+';font-weight:700">'+(best?best.wr+'%':'—')+'</td>'
      +'<td style="color:#64748b">'+(best?best.together+'판':'—')+'</td>'
      +'<td style="color:#818cf8;font-size:.8rem">▼ 상세</td>'
      +'</tr>'
      +'<tr id="'+uid+'" style="display:none"><td colspan="5" style="padding:0">'
      +'<div style="padding:10px;background:rgba(129,140,248,.05);border-top:1px solid #334155" id="'+uid+'-detail"></div>'
      +'</td></tr>';
  });
  return'<div style="padding-bottom:20px">'+synInfo
    +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="t" style="min-width:480px"><thead><tr><th style="text-align:left">선수</th><th style="text-align:left">베스트 파트너</th><th>함께 승률</th><th>동행</th><th></th></tr></thead>'
    +'<tbody>'+synRows+'</tbody></table></div></div>';
}

function renderRivalsPage(insights){
  if(!insights||!insights.rivals.length){
    return'<div class="spinner">💡 Apps Script에서 🔥 인사이트 데이터 추출을 실행해주세요.</div>';
  }
  var rivRows=insights.rivals.slice(0,15).map(function(r,i){

    +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="t" style="min-width:420px"><thead><tr><th>#</th><th>선수 A</th><th></th><th>선수 B</th><th>에이스 대결</th></tr></thead><tbody>'+rivRows+'</tbody></table></div>'
    +'</div>';

function renderFormWidget(insights){
  if(!insights)return'';

  // 경기당 수상 3개(MOM·스페셜·투혼상) → 30건 = 약 10경기 분량
  var RECENT_SLICE=30;
  var momCnt={},spcCnt={},spiCnt={};
  // 동률 시 최신순 타이브레이커: 각 선수의 가장 최근 수상 인덱스 (낮을수록 최신)
  var momRecent={},spcRecent={},spiRecent={};
  ALL.forEach(function(p){momCnt[p]=0;spcCnt[p]=0;spiCnt[p]=0;momRecent[p]=Infinity;spcRecent[p]=Infinity;spiRecent[p]=Infinity;});
  var hasData=false;
  var usingFallback=false; // fallback 여부를 별도 추적

  if(insights.recentAwards&&insights.recentAwards.length){
    insights.recentAwards.slice(0,RECENT_SLICE).forEach(function(a,idx){
      var t=(a.type||'').trim();
      if(momCnt[a.player]!==undefined){
        if(t==='MOM')    {momCnt[a.player]++;if(idx<momRecent[a.player])momRecent[a.player]=idx;hasData=true;}
        if(t==='스페셜') {spcCnt[a.player]++;if(idx<spcRecent[a.player])spcRecent[a.player]=idx;hasData=true;}
        if(t==='투혼상') {spiCnt[a.player]++;if(idx<spiRecent[a.player])spiRecent[a.player]=idx;hasData=true;}
      }
    });
  }

  // fallback: recentAwards 타입 값 없으면 champAwards 누적치 사용
  // hasData는 덮어쓰지 않고 usingFallback으로만 추적
  if(!hasData&&insights.champAwards&&insights.champAwards.length){
    usingFallback=true;
    insights.champAwards.forEach(function(a){
      if(momCnt[a.player]!==undefined){
        momCnt[a.player]+=(a.mom||0);
        spcCnt[a.player]+=(a.special||0);
        spiCnt[a.player]+=(a.spirit||0);
      }
    });
    hasData=ALL.some(function(p){return momCnt[p]+spcCnt[p]+spiCnt[p]>0;});
  }

  if(!hasData){
    return'<div style="padding:10px 16px 12px;border-bottom:1px solid #1e293b;margin-bottom:4px;font-size:.78rem;color:#475569">🔥 최근 활약 현황 — 인사이트 데이터 추출 후 표시됩니다</div>';
  }

  // 1차: 횟수 많은 순 / 동률 시 2차: 최근 수상일 앞선 순
  var topMOM=ALL.slice().sort(function(a,b){return momCnt[b]!==momCnt[a]?momCnt[b]-momCnt[a]:momRecent[a]-momRecent[b];}).slice(0,3);
  var topSpc=ALL.slice().sort(function(a,b){return spcCnt[b]!==spcCnt[a]?spcCnt[b]-spcCnt[a]:spcRecent[a]-spcRecent[b];}).slice(0,3);
  var topSpi=ALL.slice().sort(function(a,b){return spiCnt[b]!==spiCnt[a]?spiCnt[b]-spiCnt[a]:spiRecent[a]-spiRecent[b];}).slice(0,3);

  // usingFallback일 때만 "누적 기준" 표시 — hasData만으론 구분 불가
  var periodLabel=usingFallback?'누적 기준 (인사이트 재추출 시 최근 기준으로 전환)':'최근 10경기 기준';
  var periodColor='#94a3b8';

  // 카드 렌더 — cnt=0이면 이름 흐리게, 횟수 '–' 표시
  function pCard(p,cnt,col,bg){
    var hasCnt=cnt>0;
    var _pe=p.replace(/'/g,"\\'");
    return'<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:'+(hasCnt?bg:'transparent')+';border-radius:8px;opacity:'+(hasCnt?'1':'.4')+'">'
      +at(AN[p]?AN[p].t:'B')
      +'<span onclick="showPlayerMatches(\''+_pe+'\',null)" style="font-weight:700;font-size:.82rem;flex:1;cursor:pointer">'+p+'</span>'
      +'<span style="color:'+(hasCnt?col:'#475569')+';font-weight:900;font-size:.82rem">'+(hasCnt?cnt+'회':'–')+'</span>'
      +'</div>';
  }

  var momHtml=topMOM.map(function(p){return pCard(p,momCnt[p],'#fbbf24','rgba(251,191,36,.06)');}).join('');
  var spcHtml=topSpc.map(function(p){return pCard(p,spcCnt[p],'#60a5fa','rgba(96,165,250,.06)');}).join('');
  var spiHtml=topSpi.map(function(p){return pCard(p,spiCnt[p],'#f472b6','rgba(244,114,182,.06)');}).join('');

  return'<div style="padding:10px 16px 14px;border-bottom:1px solid #1e293b;margin-bottom:4px">'
    +'<div style="font-size:.65rem;color:'+periodColor+';letter-spacing:.3px;margin-bottom:8px">'+periodLabel+'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#fbbf24;margin-bottom:6px">🔥 최근 승리 견인중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(MOM)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+momHtml+'</div>'
      +'</div>'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#60a5fa;margin-bottom:6px">⭐ 최근 묵묵 활약중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(스페셜)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+spcHtml+'</div>'
      +'</div>'
      +'<div style="flex:1;min-width:150px">'
        +'<div style="font-size:.72rem;font-weight:700;color:#f472b6;margin-bottom:6px">💜 최근 고통 감내중 <span style="font-weight:400;opacity:.45;font-size:.66rem">(투혼상)</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:4px">'+spiHtml+'</div>'
      +'</div>'
    +'</div></div>';
}

function initPerfTabs(){
  var perfPanel=document.getElementById('perf-tab-inner');
  if(!perfPanel)return;
  var ptabs=perfPanel.querySelectorAll('[data-ptab]');
  ptabs.forEach(function(btn){
    btn.addEventListener('click',function(){
      ptabs.forEach(function(b){b.classList.remove('act');});
      btn.classList.add('act');
      var t=btn.getAttribute('data-ptab');
      ['kda','dealt','taken'].forEach(function(id){
        var el=document.getElementById('perf-'+id);if(el)el.style.display=t===id?'block':'none';
      });
    });
  });
}

        +'<td class="nm" style="width:'+W.champ+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+(function(){var pd=window._posData;var pos=pd&&pd.matchPos?pd.matchPos[r.player+'|'+r.date+'|'+r.champ]:'';return pos?posTag(pos)+' ':'';}())+champIcon(r.champ,20)+' '+r.champ+'</td>'
        +'<td style="width:'+W.val+';color:#fbbf24;font-weight:900;font-size:.95rem;text-align:'+valAlign+'">'+val+'</td>'
        +'<td style="width:'+W.date+';color:#60a5fa;font-size:.8rem;text-align:center;cursor:pointer;text-decoration:underline;text-decoration-color:rgba(96,165,250,.3)" onclick="showMatchByDatePlayer(\''+r.date+'\',\''+r.player+'\',\''+r.champ+'\')" title="경기 상세 보기">'+(r.date||'-')+'</td>'
        +'<td style="width:'+W.won+';color:'+wonCol+';font-weight:700;text-align:center">'+(r.won||'-')+'</td>'

    return'<table class="t" style="min-width:600px">'
      +'<thead><tr>'

      +'<th style="width:'+W.won+'">승패</th>'
      +'<th style="width:'+W.year+'">시즌</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table>';
  }
  return'<div style="margin-bottom:12px;padding:8px 14px;background:#1e293b;border-radius:8px;border-left:3px solid #334155;font-size:.78rem;color:#94a3b8">📌 가한/받은 피해량은 2026 시즌 기준으로 집계됩니다.</div>'+'<div style="display:grid;grid-template-columns:1fr;gap:20px">'
    +'<div class="kda-section-wrap"><div class="kda-section-title">⚡ KDA TOP 20 <span class="ka-sub">단일 경기 최고 기록</span></div>'
    +perfTable(insights.topKDA,'KDA',function(r){return r.kda+' ('+r.k+'/'+r.d+'/'+r.a+')';})
    +'</div>'
    +'<div class="kda-section-wrap"><div class="kda-section-title">🗡️ 가한 피해량 TOP 20 <span class="ka-sub">단일 경기</span></div>'
    +perfTable(insights.topDmgDealt,'피해량',function(r){return r.val.toLocaleString();})
    +'</div>'
    +'<div class="kda-section-wrap"><div class="kda-section-title">🛡️ 받은 피해량 TOP 20 <span class="ka-sub">단일 경기</span></div>'
    +perfTable(insights.topDmgTaken,'받은피해량',function(r){return r.val.toLocaleString();})
    +'</div>'
    +'</div>';
}

function champAwardBadge(player,champ,insights){
  if(!insights||!insights.champAwards)return'';
  var a=insights.champAwards.find(function(x){return x.player===player&&x.champ===champ;});
  if(!a||a.total===0)return'';
  var parts=[];
  if(a.mom>0)    parts.push('<span class="aw-tag" data-tip-id="award-mom"    style="color:#fbbf24">👑<span style="font-size:.7rem">'+a.mom+'</span></span>');
  if(a.special>0)parts.push('<span class="aw-tag" data-tip-id="award-special" style="color:#a78bfa">⭐<span style="font-size:.7rem">'+a.special+'</span></span>');
  if(a.spirit>0) parts.push('<span class="aw-tag" data-tip-id="award-spirit"  style="color:#f472b6">💪<span style="font-size:.7rem">'+a.spirit+'</span></span>');
  if(!parts.length)return'';
  return'<span style="margin-left:10px;display:inline-flex;gap:9px;vertical-align:middle;align-items:center;border-left:1px solid rgba(51,65,85,.6);padding-left:10px">'+parts.join('')+'</span>';
}

window.toggleSynRow=function(uid,p){
  var row=document.getElementById(uid);
  if(!row)return;
  var isOpen=row.style.display==='table-row';
  // 모두 닫기
  document.querySelectorAll('tr[id^="syn-"]').forEach(function(el){
    if(el.id.indexOf('-detail')<0&&el.id!==uid)el.style.display='none';
  });
  if(isOpen){row.style.display='none';return;}
  row.style.display='table-row';
  var detail=document.getElementById(uid+'-detail');
  if(!detail)return;
  var insights=window._insights||{synergy:[]};
  var pairs=insights.synergy.filter(function(s){return(s.p1===p||s.p2===p)&&s.together>=5;})
    .map(function(s){var partner=s.p1===p?s.p2:s.p1;return{partner:partner,together:s.together,wins:s.wins,wr:s.wr};})
    .sort(function(a,b){return b.wr-a.wr;});
  var rows=pairs.map(function(s,i){
    var wrCol=s.wr>=60?'#4ade80':s.wr>=50?'#60a5fa':'#f87171';
    return'<tr><td class="rk">'+(i+1)+'</td>'
      +'<td class="nm">'+at(AN[s.partner]?AN[s.partner].t:'B')+' '+s.partner+'</td>'
      +'<td>'+s.together+'판</td>'
      +'<td style="color:'+wrCol+';font-weight:700">'+s.wr+'%</td>'
      +'<td style="color:'+wrCol+'">'+(s.wr>=65?'💚 최고 파트너':s.wr<40?'🔴 어려운 조합':'')+'</td></tr>';
  }).join('');
  detail.innerHTML='<table class="t"><thead><tr><th>#</th><th>파트너</th><th>동행경기</th><th>함께 승률</th><th></th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" style="color:#475569;text-align:center">데이터 없음 (최소 5경기 필요)</td></tr>')+'</tbody></table>';
};

// 선수명으로 KDA 파싱
window._parsePlayerKDA=function(kdaStr,playerName){
  if(!kdaStr||!playerName)return null;
  var result=null;
  kdaStr.split('|').forEach(function(e){
    var idx=e.indexOf(':');if(idx<0)return;
    if(e.substring(0,idx).trim()!==playerName)return;
    var parts=e.substring(idx+1).trim().split('/');
    if(parts.length<3)return;
    var k=+parts[0],d=+parts[1],a=+parts[2];
    result={k:k,d:d,a:a,kda:d>0?Math.round((k+a)/d*100)/100:k+a};
  });
  return result;
};

// matchLog 필터링 → 목록 아이템 배열 생성
window.buildMatchListItems=function(playerName,champName,yearFilter){
  var log=window._matchLog||[];
  var items=[];
  var pA=window._parseAward||function(){return null;};
  var pT=window._parseTeam||function(){return[];};
  log.forEach(function(m,idx){
    if(yearFilter&&m.year!==yearFilter)return;
    // 팀 번호 추적 (0=1팀, 1=2팀)
    var found=null, foundTeam=-1;
    [m.team1,m.team2].forEach(function(teamStr,ti){
      if(!teamStr)return;
      teamStr.split('|').forEach(function(e){
        var bi=e.lastIndexOf('(');if(bi<0)return;
        var pl=e.substring(0,bi).trim(), ch=e.substring(bi+1).replace(')','').trim();
        if(playerName&&pl!==playerName)return;
        if(champName&&ch!==champName)return;
        if(!found){found={player:pl,champ:ch};foundTeam=ti;}
      });
    });
    if(!found)return;
    // 이 선수의 승/패 판정
    var playerWon=(m.result==='1팀 승'&&foundTeam===0)||(m.result==='2팀 승'&&foundTeam===1);
    var kda=playerName?window._parsePlayerKDA(m.playerKda,playerName):null;
    var award='';
    if(playerName){
      var pn=function(s){if(!s)return'';var i=s.lastIndexOf('(');return i>=0?s.substring(0,i).trim():s;};
      if(pn(m.mom)===playerName)award='👑';
      else if(pn(m.special)===playerName)award='⭐';
      else if(pn(m.spirit)===playerName)award='💪';
    }
    var _pd=window._posData;
    var _pos=(_pd&&_pd.matchPos)?_pd.matchPos[found.player+'|'+m.date+'|'+found.champ]||'':'';
    items.push({idx:idx,date:m.date,year:m.year,result:m.result,won:playerWon,champ:found.champ,kda:kda,award:award,pos:_pos});
  });
  return items;
};

      entries.forEach(function(e,pi){
        if(pi>=posArr.length)return;
        if(posArr[pi]!==pos)return;
        var bi=e.lastIndexOf('(');if(bi<0)return;
        var pl=e.substring(0,bi).trim(),ch=e.substring(bi+1).replace(')','').trim();
        if(pl!==playerName)return;
        if(!found){found={player:pl,champ:ch};foundTeam=ti;}
      });
    });
    if(!found)return;
    var playerWon=(m.result==='1팀 승'&&foundTeam===0)||(m.result==='2팀 승'&&foundTeam===1);
    var kda=window._parsePlayerKDA(m.playerKda,playerName);
    var award='';
    var pn=function(s){if(!s)return'';var i=s.lastIndexOf('(');return i>=0?s.substring(0,i).trim():s;};
    if(pn(m.mom)===playerName)award='👑';
    else if(pn(m.special)===playerName)award='⭐';
    else if(pn(m.spirit)===playerName)award='💪';
    items.push({idx:idx,date:m.date,year:m.year,result:m.result,won:playerWon,champ:found.champ,kda:kda,award:award,pos:pos});
  });
  return items;
};
window.showPosMatches=function(player,pos){
  var posLabel={T:'탑',J:'정글',M:'미드',B:'원딜',S:'서폿'};
  var items=window.buildMatchListItemsByPos(player,pos);
  showMatchListPopup(player+' · '+(posLabel[pos]||pos)+' 출전 경기',items);
};

// 연결 포인트별 진입 함수
window.showPlayerChampMatches=function(player,champ){
  showMatchListPopup(player+' · '+champ+' 출전 경기',window.buildMatchListItems(player,champ,null));
};
window.showPlayerAwardMatches=function(player){
  var log=window._matchLog||[];
  var pA=window._parseAward||function(){return null;};
  var pT=window._parseTeam||function(){return[];};
  var pn=function(s){if(!s)return'';var i=s.lastIndexOf('(');return i>=0?s.substring(0,i).trim():s;};
  var items=[];
  log.forEach(function(m,idx){
    var award='';
    if(pn(m.mom)===player)award='👑';
    else if(pn(m.special)===player)award='⭐';
    else if(pn(m.spirit)===player)award='💪';
    if(!award)return;
    var kda=window._parsePlayerKDA(m.playerKda,player);
    var teams=pT(m.team1).concat(pT(m.team2));
    var fc=null;teams.forEach(function(p){if(p.player===player)fc=p.champ;});
    items.push({idx:idx,date:m.date,year:m.year,result:m.result,champ:fc,kda:kda,award:award});
  });
  showMatchListPopup(player+' 수상 경기',items);
};
window.showPlayerMatches=function(player,year){
  var items=window.buildMatchListItems(player,null,year||null);
  showMatchListPopup(player+' 출전 경기'+(year?' ('+year+'시즌)':''),items);
};

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var mp=document.getElementById('match-popup');
    var lp=document.getElementById('match-list-popup');
    if(mp&&mp.style.display!=='none')closeMatchPopup();
    else if(lp&&lp.style.display!=='none')closeMatchListPopup();
  }
});
